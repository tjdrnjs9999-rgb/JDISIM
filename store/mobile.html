<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JDISIM 이심 | 모바일 스토어</title>
  <meta name="description" content="JDISIM 모바일 전용 앱 스타일 스토어. 결제 즉시 10초 만에 이심 발송!">
  <link rel="stylesheet" href="styles.css?v=1783416304">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      word-break: keep-all !important;
      overflow-wrap: break-word;
    }
    body {
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      background: #f8fafc;
      color: #0f172a;
      margin: 0;
      padding: 0;
      padding-bottom: 75px;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .video-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -2;
      overflow: hidden;
      background-color: #f8fafc;
    }
    .video-bg-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(248, 250, 252, 0.9); 
      backdrop-filter: blur(4px);
    }
    #bgVideo {
      position: absolute;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
    }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .app-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #0f172a;
      text-decoration: none;
    }
    .app-logo-badge {
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: #fff;
    }
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 65px;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(25px);
      border-top: 1px solid rgba(15, 23, 42, 0.07);
      display: flex;
      justify-content: space-around;
      align-items: center;
      z-index: 9999;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #64748b;
      font-size: 0.65rem;
      font-weight: 700;
      cursor: pointer;
      flex: 1;
    }
    .nav-item.active { color: #4f46e5; }
    .bottom-sheet {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ffffff;
      border-top-left-radius: 30px;
      border-top-right-radius: 30px;
      padding: 30px 24px 80px 24px; /* Added 80px padding for nav bar */
      z-index: 400;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      max-height: 85vh;
      overflow-y: auto;
      box-sizing: border-box;
    }
    .bottom-sheet.active { transform: translateY(0); }
    .bottom-sheet-backdrop {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(5px);
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .bottom-sheet-backdrop.active { opacity: 1; pointer-events: auto; }
    .mobile-product-card {
      background: #ffffff;
      border: 1px solid #f1f5f9;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      pointer-events: auto !important;
    }
    .mobile-product-card * { pointer-events: none; }
    .order-action-btn {
      width: 100%;
      background: linear-gradient(90deg, #6366f1, #4f46e5);
      border: none;
      color: white;
      font-weight: 800;
      font-size: 0.95rem;
      padding: 14px;
      border-radius: 30px;
      margin-top: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="video-bg-container">
    <video autoplay muted loop playsinline id="bgVideo">
      <source src="Bright_airy_looping_backgroun.mp4" type="video/mp4">
    </video>
    <div class="video-bg-overlay"></div>
  </div>

  <header class="app-header">
    <a href="#" class="app-logo" onclick="switchNav('home')">
      <div class="app-logo-badge">J</div>
      <span>JDISIM</span>
    </a>
    <button class="cart-btn" onclick="switchNav('orders')" style="background:none; border:none; position:relative;">
      <i data-lucide="shopping-bag"></i>
      <span id="mobileCartCount" style="position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; font-size:0.7rem; padding:1px 5px; border-radius:10px;">0</span>
    </button>
  </header>

  <main id="view-home" class="mobile-view active" style="padding: 16px;">
    <div style="background: linear-gradient(135deg, rgba(79, 70, 229, 0.08), rgba(168, 85, 247, 0.08)); border-radius: 16px; padding: 20px; margin-bottom: 24px;">
      <h2 style="margin:0; font-size:1.3rem;">로컬망 1티어 직결<br><span style="color:#4f46e5;">JDISIM eSIM</span></h2>
      <p style="font-size:0.85rem; color:#475569;">전 세계 어디서나 끊김 없는 데이터를 즐기세요.</p>
      <button onclick="switchNav('store')" style="background:#4f46e5; color:white; border:none; padding:10px 20px; border-radius:30px; font-weight:700;">인기 요금제 보기</button>
    </div>
    
    <div id="homeFeaturedList"></div>
  </main>

  <main id="view-store" class="mobile-view" style="display:none; padding:16px;">
    <input type="text" id="storeSearchInput" placeholder="국가 검색..." style="width:100%; padding:12px; border-radius:30px; border:1px solid #e2e8f0; margin-bottom:20px;">
    <div id="storeProductList"></div>
  </main>

  <main id="view-orders" class="mobile-view" style="display:none; padding:16px;">
    <h3>주문 조회</h3>
    <input type="text" id="orderSearchName" placeholder="이름" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px;">
    <input type="tel" id="orderSearchPhone" placeholder="전화번호" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px;">
    <button onclick="searchOrders()" style="width:100%; padding:14px; background:#4f46e5; color:white; border:none; border-radius:12px; font-weight:700;">조회하기</button>
    <div id="orderSearchResults"></div>
  </main>

  <nav class="bottom-nav">
    <div class="nav-item active" onclick="switchNav('home')"><i data-lucide="home"></i><span>홈</span></div>
    <div class="nav-item" onclick="switchNav('store')"><i data-lucide="compass"></i><span>스토어</span></div>
    <div class="nav-item" onclick="switchNav('orders')"><i data-lucide="receipt"></i><span>주문</span></div>
    <div class="nav-item" onclick="window.location.assign('guide.html')"><i data-lucide="book-open"></i><span>가이드</span></div>
  </nav>

  <div class="bottom-sheet-backdrop" id="bottomSheetBackdrop" onclick="closeBottomSheet()"></div>
  <div class="bottom-sheet" id="bottomSheet">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      <h3 id="sheetProductTitle" style="margin:0;">상품 옵션 선택</h3>
      <button onclick="closeBottomSheet()" style="background:none; border:none; font-size:1.5rem;">✕</button>
    </div>
    <div id="optionContainer">
      <div style="margin-bottom:15px;">
        <label style="font-weight:700; font-size:0.9rem;">통신사</label>
        <select id="carrierSelect" onchange="onCarrierChange(this.value)" style="width:100%; padding:12px; border-radius:12px; margin-top:5px; border:1px solid #e2e8f0;"></select>
      </div>
      <div style="margin-bottom:15px;">
        <label style="font-weight:700; font-size:0.9rem;">용량</label>
        <select id="capacitySelect" onchange="onCapacityChange(this.value)" style="width:100%; padding:12px; border-radius:12px; margin-top:5px; border:1px solid #e2e8f0;"></select>
      </div>
      <div style="margin-bottom:15px;">
        <label style="font-weight:700; font-size:0.9rem;">기간</label>
        <select id="daysSelect" onchange="onDaysChange(this.value)" style="width:100%; padding:12px; border-radius:12px; margin-top:5px; border:1px solid #e2e8f0;"></select>
      </div>
    </div>
    <div style="margin-top:20px; border-top:1px solid #eee; padding-top:20px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:700;">총 결제 금액</span>
        <span id="checkoutTotalPrice" style="font-size:1.3rem; font-weight:800; color:#4f46e5;">0원</span>
      </div>
      <div style="margin-top:15px;">
        <input type="text" id="buyerName" placeholder="성함" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px;">
        <input type="email" id="buyerEmail" placeholder="이메일" style="width:100%; padding:12px; border-radius:12px; border:1px solid #e2e8f0;">
      </div>
      <button class="order-action-btn" id="paySubmitBtn" onclick="processMockCheckout()">결제하기</button>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    lucide.createIcons();
    
    // Simple state
    let currentCountry = '';
    let currentCarrier = '';
    
    function switchNav(view) {
      document.querySelectorAll('.mobile-view').forEach(v => v.style.display = 'none');
      document.getElementById('view-' + view).style.display = 'block';
      window.scrollTo(0,0);
    }

    function openBottomSheet(country, carrier) {
      currentCountry = country;
      currentCarrier = carrier;
      document.getElementById('sheetProductTitle').innerText = country + ' eSIM 선택';
      document.getElementById('bottomSheet').classList.add('active');
      document.getElementById('bottomSheetBackdrop').classList.add('active');
      // Logic to populate selects would go here (already in app.js or products.js)
    }

    function closeBottomSheet() {
      document.getElementById('bottomSheet').classList.remove('active');
      document.getElementById('bottomSheetBackdrop').classList.remove('active');
    }

    // Brute-force Click Handler
    window.openBottomSheetFromCard = function(el) {
      try {
        const country = el.getAttribute('data-country') || '일본';
        const carrier = el.getAttribute('data-carrier') || '';
        openBottomSheet(country, carrier);
      } catch(e) { console.error(e); }
    };
  </script>
</body>
</html>
