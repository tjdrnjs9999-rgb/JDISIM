<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#101623">
<title>eSIM 발급 — JDISIM</title>
<meta name="robots" content="noindex">
<style>
  /* ============================================================
     JDISIM E-SIM PASS · Wallet-grade minimal
     ink #101623 · paper #fff · bg #F7F8FA · line #E9ECF2
     accent #F1690D — 절제해서 단 한 곳씩만
  ============================================================ */
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:17px; -webkit-text-size-adjust:100%; text-size-adjust:100%; }
  html.fz2 { font-size:19px; } html.fz3 { font-size:21px; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:#FAF8F4; min-height:100dvh; color:#101623; -webkit-font-smoothing:antialiased; word-break:keep-all; overflow-wrap:break-word; }
  body::before { content:''; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image:radial-gradient(rgba(16,22,35,0.05) 1px, transparent 1px);
    background-size:23px 23px; }
  body::after { content:''; position:fixed; top:-140px; left:50%; transform:translateX(-50%); z-index:-1; width:620px; height:420px; pointer-events:none;
    background:radial-gradient(closest-side, rgba(241,105,13,0.1), transparent 72%); }
  ::selection { background:rgba(241,105,13,0.18); }
  .i { vertical-align:-3px; }

  /* ── 오프라인 바 ── */
  .offbar { position:fixed; top:0; left:0; right:0; z-index:660; background:#101623; color:#fff; text-align:center; font-size:0.8rem; font-weight:700; padding:10px 14px; display:none; }
  .offbar.on { display:block; }

  /* ── 헤더: 슬림 잉크 바 ── */
  .hd { position:relative; background:#101623; padding:calc(13px + env(safe-area-inset-top,0px)) 0 56px; overflow:hidden; }
  .hd::before { content:''; position:absolute; top:-70px; right:-60px; width:280px; height:220px; background:radial-gradient(closest-side, rgba(241,105,13,0.4), transparent 70%); filter:blur(6px); }
  .hd::after { content:''; position:absolute; bottom:-90px; left:-70px; width:260px; height:200px; background:radial-gradient(closest-side, rgba(245,158,11,0.22), transparent 70%); }
  .hd-in { position:relative; z-index:1; }
  .hd-in { max-width:430px; margin:0 auto; padding:0 20px; display:flex; align-items:center; gap:10px; }
  .wm { color:#fff; font-size:1rem; font-weight:900; letter-spacing:0.18em; }
  .wm i { font-style:normal; color:#F1690D; }
  .chip { display:none; align-items:center; gap:6px; padding:6px 11px; border-radius:15px; border:1px solid rgba(255,255,255,0.16); color:#B7BFCF; font-size:0.68rem; font-weight:800; }
  .chip.on { display:inline-flex; }
  .fzbtn { margin-left:auto; display:flex; align-items:baseline; gap:3px; padding:8px 12px; border-radius:12px; border:1px solid rgba(255,255,255,0.18); background:none; color:#fff; font-family:inherit; font-size:0.86rem; font-weight:900; cursor:pointer; }
  .fzbtn span { font-size:0.62rem; color:#F1690D; font-weight:900; letter-spacing:1px; min-width:12px; }

  /* ── 레이아웃 ── */
  .wrap { max-width:430px; margin:-36px auto 0; position:relative; padding:0 16px calc(108px + env(safe-area-inset-bottom,0px)); }
  .card { background:#fff; border:1px solid #ECE8E0; border-radius:20px; padding:18px; box-shadow:0 1px 2px rgba(16,22,35,0.04), 0 10px 28px rgba(16,22,35,0.05); margin-bottom:12px; animation:rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  @keyframes rise { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  .ey { font-size:0.6rem; font-weight:800; letter-spacing:0.16em; color:#8B94A7; }
  .ct { font-size:0.98rem; font-weight:800; margin-top:3px; }
  .ct span { font-size:0.74rem; font-weight:700; color:#8B94A7; margin-left:6px; }
  .shd { display:flex; align-items:center; gap:12px; }
  .shd .cic { flex-shrink:0; width:40px; height:40px; border-radius:13px; display:flex; align-items:center; justify-content:center; color:#F1690D; background:linear-gradient(150deg,rgba(241,105,13,0.1),rgba(245,158,11,0.05)); border:1px solid rgba(241,105,13,0.18); }
  .shd .ct { margin-top:2px; }
  .muted { color:#8B94A7; font-size:0.8rem; font-weight:600; line-height:1.65; }
  .center { text-align:center; }

  /* ── 티켓: 크래프티드 히어로 ── */
  .tkt { position:relative; background:#fff; border-radius:24px; box-shadow:0 2px 4px rgba(16,22,35,0.06), 0 26px 54px rgba(16,22,35,0.16); margin-bottom:12px; overflow:hidden; animation:rise 0.55s cubic-bezier(0.16,1,0.3,1) both; }
  .tkt-band { position:relative; display:flex; justify-content:space-between; align-items:center; padding:13px 20px; background:linear-gradient(115deg,#F1690D,#F59E0B); overflow:hidden; }
  .tkt-band::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(115deg, rgba(255,255,255,0.09) 0 2px, transparent 2px 13px); }
  .tkt-band::after { content:''; position:absolute; top:0; left:-70%; width:44%; height:100%; background:linear-gradient(105deg,transparent,rgba(255,255,255,0.38),transparent); transform:skewX(-18deg); animation:sheen 5.4s ease-in-out infinite 1.4s; }
  @keyframes sheen { 0%,66% { left:-70%; } 86%,100% { left:135%; } }
  .tkt-band .twm { position:relative; color:#fff; font-size:0.66rem; font-weight:800; letter-spacing:0.22em; }
  .st { position:relative; display:inline-flex; align-items:center; gap:6px; font-size:0.72rem; font-weight:800; padding:6px 11px; border-radius:14px; background:rgba(255,255,255,0.2); color:#fff; border:1px solid rgba(255,255,255,0.35); }
  .st i { width:7px; height:7px; border-radius:50%; background:#fff; box-shadow:0 0 0 3px rgba(255,255,255,0.25); }
  .st.ok i { background:#B7F5CF; }
  .tkt-hero { display:flex; align-items:center; gap:15px; padding:19px 20px 4px; }
  .tkt-hero .flag { font-size:2.6rem; line-height:1; filter:drop-shadow(0 5px 12px rgba(16,22,35,0.18)); }
  .tkt-hero .nm { min-width:0; }
  .tkt-hero .nm b { display:block; font-size:1.62rem; font-weight:900; letter-spacing:-0.02em; line-height:1.15; }
  .tkt-hero .nm i { display:block; font-style:normal; margin-top:4px; font-size:0.68rem; font-weight:800; letter-spacing:0.14em; color:#8B94A7; }
  .tkt-hero .nm i em { font-style:normal; color:#F1690D; }
  /* 스펙 셀 (메인 정보) */
  .specs { display:flex; margin:15px 20px 0; border:1.5px solid #EFE7DC; background:#FDFBF7; border-radius:17px; overflow:hidden; }
  .specs > div { flex:1; padding:13px 6px 12px; text-align:center; min-width:0; }
  .specs > div + div { border-left:1.5px dashed #EFE7DC; }
  .specs .sk { font-size:0.6rem; font-weight:800; letter-spacing:0.14em; color:#B0A28C; }
  .specs .sv { font-size:1.02rem; font-weight:900; margin-top:4px; letter-spacing:-0.01em; font-variant-numeric:tabular-nums; word-break:keep-all; line-height:1.3; }
  .specs .sv small { font-size:0.72rem; font-weight:800; }
  .specs .s2 { font-size:0.6rem; font-weight:800; color:#0E8A45; margin-top:3px; }
  .tkt-perf { position:relative; border-top:1.5px dashed #E9E2D6; margin:17px 0 0; }
  .tkt-perf::before, .tkt-perf::after { content:''; position:absolute; top:-10px; width:20px; height:20px; border-radius:50%; background:#FAF8F4; box-shadow:inset 0 1px 3px rgba(16,22,35,0.09); }
  .tkt-perf::before { left:-10px; } .tkt-perf::after { right:-10px; }
  .tkt-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px 14px; padding:15px 20px 0; }
  .tkt-grid .k { font-size:0.58rem; font-weight:800; letter-spacing:0.15em; color:#8B94A7; }
  .tkt-grid .v { font-size:0.9rem; font-weight:800; margin-top:3px; line-height:1.4; word-break:keep-all; }
  /* 티켓 내장 설치 존 */
  .tz { padding:15px 20px 2px; }
  .tz-h { display:flex; align-items:center; gap:8px; font-size:0.88rem; font-weight:900; }
  .tz-h .i { color:#F1690D; }
  .tz-h span { margin-left:auto; font-size:0.68rem; font-weight:700; color:#8B94A7; }
  .tz .stp-note { padding:2px 0 12px; }
  /* 출국일 예보 라인 */
  .sw-fc { margin-top:10px; padding:11px 13px; border-radius:13px; background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.28); font-size:0.82rem; font-weight:800; backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  .sw-fc b { font-variant-numeric:tabular-nums; }
  .sw-fc.dim { opacity:0.82; font-weight:700; }
  .tkt-acts { display:flex; gap:8px; padding:14px 20px 0; }
  .tkt-acts button { flex:1; display:flex; align-items:center; justify-content:center; gap:7px; min-height:47px; border:1.5px solid #EFE7DC; border-radius:13px; background:#FDFBF7; font-family:inherit; font-size:0.8rem; font-weight:800; color:#101623; cursor:pointer; }
  .tkt-acts button .i { color:#F1690D; }
  .tkt-acts button:active { transform:scale(0.97); }
  .tkt-bar { padding:14px 20px 8px; }
  .barcode { height:30px; border-radius:2px; opacity:0.9; background:repeating-linear-gradient(90deg,#101623 0 1.5px,transparent 1.5px 3.5px,#101623 3.5px 6px,transparent 6px 7px,#101623 7px 8px,transparent 8px 11px); }
  /* 상세 정보 (주문번호·ICCID 접힘) */
  .tkt-more { width:100%; display:flex; align-items:center; justify-content:center; gap:6px; border:none; background:none; padding:12px 0 15px; font-family:inherit; font-size:0.72rem; font-weight:800; letter-spacing:0.05em; color:#B0B8C6; cursor:pointer; }
  .tkt-more .i { transition:transform 0.25s; transform:rotate(90deg); }
  .tkt-more.open .i { transform:rotate(-90deg); }
  .tkt-detail { display:none; padding:0 20px 17px; }
  .tkt-detail.open { display:block; }
  .tkt-detail .dr { display:flex; justify-content:space-between; gap:12px; padding:8px 0; font-size:0.76rem; border-top:1px solid #F4F0E9; }
  .tkt-detail .dr span { color:#8B94A7; font-weight:700; flex-shrink:0; }
  .tkt-detail .dr b { font-family:ui-monospace,Menlo,monospace; font-weight:600; color:#3D4657; word-break:break-all; text-align:right; }
  /* 발권 프린트 */
  .print-slot { height:9px; border-radius:5px; background:#101623; box-shadow:inset 0 2px 5px rgba(0,0,0,0.6); margin:4px 30px 10px; }
  .tkt.printing { animation:printOut 1s cubic-bezier(0.25,0.9,0.3,1) 0.12s both; }
  @keyframes printOut { from { clip-path:inset(0 0 96% 0); transform:translateY(-14px); } to { clip-path:inset(0 0 0 0); transform:none; } }

  /* ── 스카이 위젯: 목적지의 지금 (시간대 반응 하늘) ── */
  .skyw { position:relative; border-radius:22px; padding:18px 20px 17px; margin-bottom:12px; overflow:hidden; color:#fff; box-shadow:0 14px 36px rgba(16,22,35,0.18); animation:rise 0.55s cubic-bezier(0.16,1,0.3,1) 0.06s both; transition:background 1s; }
  .skyw.t-day { background:linear-gradient(160deg,#3F8CE8,#7FBCF5 78%,#A9D4FA); }
  .skyw.t-dawn { background:linear-gradient(160deg,#2A3B6E,#7A5A9E 55%,#F59E0B); }
  .skyw.t-dusk { background:linear-gradient(160deg,#41336E,#B04A5A 60%,#F1690D); }
  .skyw.t-night { background:linear-gradient(160deg,#0B1430,#1B2C55 70%,#26386B); }
  .skyw.t-night::before { content:''; position:absolute; inset:0; pointer-events:none;
    background-image:radial-gradient(1.2px 1.2px at 12% 24%, #fff 60%, transparent), radial-gradient(1px 1px at 34% 60%, rgba(255,255,255,0.85) 60%, transparent), radial-gradient(1.4px 1.4px at 58% 18%, #fff 60%, transparent), radial-gradient(1px 1px at 76% 48%, rgba(255,255,255,0.8) 60%, transparent), radial-gradient(1.2px 1.2px at 90% 22%, #fff 60%, transparent);
    animation:tw 3.8s ease-in-out infinite; }
  @keyframes tw { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
  .skyw::after { content:''; position:absolute; top:-46px; right:-40px; width:190px; height:150px; background:radial-gradient(closest-side, rgba(255,255,255,0.28), transparent 70%); pointer-events:none; }
  .skyw > * { position:relative; z-index:1; }
  .sw-top { display:flex; justify-content:space-between; align-items:center; }
  .sw-name { font-size:0.8rem; font-weight:800; letter-spacing:0.02em; opacity:0.95; }
  .sw-wx { display:inline-flex; align-items:center; gap:7px; font-size:0.86rem; font-weight:800; padding:7px 12px; border-radius:16px; background:rgba(255,255,255,0.16); border:1px solid rgba(255,255,255,0.26); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); }
  .sw-wx .we { font-size:1.05rem; line-height:1; }
  .sw-time { font-size:2.5rem; font-weight:900; letter-spacing:-0.01em; line-height:1.05; margin-top:9px; font-variant-numeric:tabular-nums; text-shadow:0 2px 14px rgba(0,0,0,0.14); }
  .sw-time small { font-size:0.9rem; font-weight:800; opacity:0.85; margin-left:6px; letter-spacing:0; }
  .sw-sub { font-size:0.78rem; font-weight:700; opacity:0.9; margin-top:5px; }
  .sw-dday { margin-top:14px; }
  .sw-btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:50px; border:1px solid rgba(255,255,255,0.4); border-radius:14px; background:rgba(255,255,255,0.18); backdrop-filter:blur(5px); -webkit-backdrop-filter:blur(5px); color:#fff; font-family:inherit; font-size:0.92rem; font-weight:900; cursor:pointer; }
  .sw-btn:active { transform:scale(0.98); }
  .sw-note { text-align:center; font-size:0.7rem; font-weight:700; opacity:0.78; margin-top:8px; }
  .sw-chips { display:flex; gap:8px; flex-wrap:wrap; }
  .swc { display:inline-flex; align-items:center; gap:6px; padding:10px 14px; border-radius:15px; border:1px solid rgba(255,255,255,0.36); background:rgba(255,255,255,0.15); color:#fff; font-family:inherit; font-size:0.78rem; font-weight:900; cursor:pointer; }
  .swc.hot { background:#fff; color:#101623; border-color:#fff; }

  /* ── 여행 꿀팁 아코디언 ── */
  .pow-line { display:flex; align-items:center; gap:9px; margin-top:12px; padding:13px 15px; border-radius:14px; background:linear-gradient(120deg,#101623,#25314F); color:#fff; font-size:0.86rem; font-weight:800; }
  .pow-line .pe { font-size:1.1rem; }
  .acc { margin-top:9px; border:1.5px solid #ECE8E0; border-radius:15px; overflow:hidden; background:#fff; }
  .acc + .acc { margin-top:8px; }
  .acc-h { display:flex; align-items:center; gap:10px; width:100%; padding:14px 15px; border:none; background:#fff; font-family:inherit; font-size:0.88rem; font-weight:800; color:#101623; cursor:pointer; text-align:left; min-height:52px; }
  .acc-h .ae { font-size:1.15rem; line-height:1; }
  .acc-h .acnt { margin-left:auto; font-size:0.68rem; font-weight:900; color:#F1690D; background:rgba(241,105,13,0.09); padding:4px 9px; border-radius:10px; font-variant-numeric:tabular-nums; }
  .acc-h .av { color:#B0B8C6; transition:transform 0.28s; transform:rotate(90deg); }
  .acc.open .acc-h .av { transform:rotate(-90deg); }
  .acc.open .acc-h { background:#FDFBF7; }
  .acc-b { max-height:0; overflow:hidden; transition:max-height 0.34s cubic-bezier(0.2,0.8,0.3,1); }
  .acc-in { padding:4px 15px 14px; }
  .tip { display:flex; gap:9px; padding:8px 0; font-size:0.83rem; font-weight:600; line-height:1.7; color:#3D4657; }
  .tip + .tip { border-top:1px dashed #F0ECE4; }
  .tip .te { flex-shrink:0; line-height:1.6; }

  /* ── 로미 가이드 ── */
  .romi { display:flex; align-items:flex-end; gap:11px; margin-bottom:12px; animation:rise 0.5s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
  .romi img { width:58px; height:58px; object-fit:contain; animation:romiIn 0.6s cubic-bezier(0.34,1.4,0.5,1) both; }
  @keyframes romiIn { from { transform:translateY(10px) scale(0.85); opacity:0; } to { transform:none; opacity:1; } }
  .romi .bub { flex:1; background:#fff; border:1.5px solid #FFE0C4; border-radius:17px 17px 17px 5px; padding:13px 15px; font-size:0.86rem; font-weight:700; color:#3D4657; box-shadow:0 8px 22px rgba(241,105,13,0.09); line-height:1.7; }
  .romi .bub b.rn { color:#F1690D; }
  .seq-romi { display:flex; justify-content:center; padding:2px 0 8px; }
  .seq-romi img { width:74px; height:74px; object-fit:contain; animation:bounce 1.4s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-9px); } }

  /* ── 티켓 로미 워터마크 ── */
  .tkt-wm { position:absolute; right:-8px; bottom:34px; width:96px; opacity:0.055; transform:rotate(-11deg); pointer-events:none; }

  /* ── 스크롤 리빌 ── */
  .rv { opacity:0; transform:translateY(20px); transition:opacity 0.55s cubic-bezier(0.16,1,0.3,1), transform 0.55s cubic-bezier(0.16,1,0.3,1); animation:none !important; }
  .rv.in { opacity:1; transform:none; }
  /* 스펙 셀 스태거 */
  .specs > div { animation:rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  .specs > div:nth-child(1){animation-delay:0.16s} .specs > div:nth-child(2){animation-delay:0.24s} .specs > div:nth-child(3){animation-delay:0.32s}

  /* ── 트러스트 스트립 ── */
  .trust { display:flex; background:#fff; border:1px solid #ECE8E0; border-radius:18px; margin-bottom:12px; overflow:hidden; box-shadow:0 6px 18px rgba(16,22,35,0.04); }
  .trust > div { flex:1; padding:14px 8px; text-align:center; }
  .trust > div + div { border-left:1px solid #EFF2F6; }
  .trust b { display:block; font-size:0.79rem; font-weight:800; }
  .trust span { display:block; font-size:0.65rem; font-weight:700; color:#8B94A7; margin-top:3px; line-height:1.45; }
  .trust .tic { width:32px; height:32px; margin:0 auto 7px; border-radius:11px; display:flex; align-items:center; justify-content:center; color:#F1690D; background:rgba(241,105,13,0.08); }

  /* ── 스테퍼 (컴팩트 여정) ── */
  .stp { display:flex; align-items:flex-start; margin:14px 2px 4px; }
  .stp .n { display:flex; flex-direction:column; align-items:center; gap:6px; flex-shrink:0; min-width:52px; }
  .stp .d { width:24px; height:24px; border-radius:50%; border:2px solid #E4E8EF; background:#fff; color:#C6CCD8; display:flex; align-items:center; justify-content:center; font-size:0.66rem; font-weight:900; transition:all 0.3s; }
  .stp .n.done .d { background:#101623; border-color:#101623; color:#fff; }
  .stp .n.now .d { border-color:#F1690D; color:#F1690D; box-shadow:0 0 0 4px rgba(241,105,13,0.12); }
  .stp .l { font-size:0.62rem; font-weight:800; color:#B0B8C6; }
  .stp .n.done .l { color:#5B6577; } .stp .n.now .l { color:#F1690D; }
  .stp .c { flex:1; height:2px; background:#E4E8EF; margin-top:11px; border-radius:2px; }
  .stp .c.done { background:#101623; }
  .stp-body { margin-top:16px; padding-top:16px; border-top:1px solid #EFF2F6; }
  .stp-note { display:flex; align-items:center; gap:8px; font-size:0.8rem; font-weight:700; color:#0E8A45; }
  .stp-note .re { margin-left:auto; border:none; background:none; padding:4px 0; font-family:inherit; font-size:0.76rem; font-weight:800; color:#F1690D; cursor:pointer; }

  /* ── 버튼 ── */
  .btn { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; min-height:52px; padding:15px 14px; border:none; border-radius:15px; font-family:inherit; font-size:0.95rem; font-weight:800; cursor:pointer; text-decoration:none; color:#101623; text-align:center; }
  .btn-primary { background:#F1690D; color:#fff; box-shadow:0 8px 20px rgba(241,105,13,0.28); }
  .btn-primary:active { transform:scale(0.985); }
  .btn-primary[disabled] { opacity:0.65; }
  .btn-ink { background:#101623; color:#fff; }
  .btn-ghost { background:#fff; border:1.5px solid #E4E8EF; font-size:0.88rem; }
  .btn.ready { animation:readyPulse 1.6s ease-in-out infinite; }

// ── 상품명 → 정직한 스펙 (나라·용량·일수·통신사) ──
function parsePlan(name, country){
  name = String(name || '');
  var m = name.match(/(\d+(?:\.\d+)?)\s*(GB|기가|MB)/i);
  var hasUnlim = /무제한/.test(name);
  var daily = /매일|데일리/.test(name);
  var unit = m ? m[2].toUpperCase().replace('기가','GB') : '';
  // '매일2GB무제한' = 매일 2GB 고속 + 소진 후 저속 무제한 → 순수 무제한과 구분
  var pureUnlim = hasUnlim && !m;
  var data = pureUnlim ? '무제한' : (m ? (m[1] + unit) : (hasUnlim ? '무제한' : ''));
  var dm = name.match(/(\d+)\s*일/);
  var days = dm ? parseInt(dm[1], 10) : 0;
  return { data: data, daily: daily && !pureUnlim, days: days, unlimited: pureUnlim, throttle: hasUnlim && !!m };
}
// 주문의 모든 소스(스마트스토어 옵션 문자열 · SKU 코드 · 상품명)를 병합해 스펙 확정
// 예: "데이터 용량: 매일 2GB / 사용일수: KSX_한국_매일2GB_01일 / 수령방법: 구매 후 5~15분 내 QR 발송"
function planOf(o){
  o = o || {};
  var src = '';
  var opt = String(o.option || o.optionRaw || o.options || '');
  if (opt) {
    // "사용일수:" 뒤 SKU와 "데이터 용량:" 뒤 값만 추출 (수령방법 등 잡음 제거)
    var mSku = opt.match(/사용일수\s*[:：]\s*([^\/|,]+)/);
    var mData = opt.match(/데이터\s*용량\s*[:：]\s*([^\/|,]+)/);
    src = ((mData ? mData[1] : '') + ' ' + (mSku ? mSku[1] : '')).trim() || opt;
  }
  if (o.sku) src += ' ' + o.sku;
  var p = parsePlan(src);
  if (!p.data && !p.days) p = parsePlan(o.productName || '');
  else {
    var fb = parsePlan(o.productName || '');
    if (!p.data) { p.data = fb.data; p.unlimited = fb.unlimited; p.daily = p.daily || fb.daily; }
    if (!p.days) p.days = fb.days;
  }
  return p;
}

function qrSvg(text, px){
  try{
    var q = qrcode(0,'M'); q.addData(String(text)); q.make();
    var n = q.getModuleCount(), Q = 3, S = n + Q*2, d = '';
    for (var r=0;r<n;r++) for (var c=0;c<n;c++) if (q.isDark(r,c)) d += 'M'+(c+Q)+' '+(r+Q)+'h1v1h-1z';
    return '<svg class="qrsvg" width="'+px+'" height="'+px+'" viewBox="0 0 '+S+' '+S+'" shape-rendering="crispEdges" role="img" aria-label="eSIM 설치 QR"><rect width="'+S+'" height="'+S+'" fill="#fff"/><path d="'+d+'" fill="#0f172a"/></svg>';
  }catch(e){ return null; }
}
function saveQrLocal(lpa){
  try{
    var q = qrcode(0,'M'); q.addData(String(lpa)); q.make();
    var n = q.getModuleCount(), Q = 4, cell = 20, S = (n+Q*2)*cell;
    var cv = document.createElement('canvas'); cv.width = cv.height = S;
    var g = cv.getContext('2d');
    g.fillStyle = '#fff'; g.fillRect(0,0,S,S);
    g.fillStyle = '#0f172a';
    for (var r=0;r<n;r++) for (var c=0;c<n;c++) if (q.isDark(r,c)) g.fillRect((c+Q)*cell,(r+Q)*cell,cell,cell);
    cv.toBlob(function(b){
      var a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'JDISIM-eSIM-QR.png'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 4000);
      toast('QR 이미지가 저장됐어요');
    }, 'image/png');
  }catch(e){ toast('저장에 실패했어요 — QR을 스크린샷으로 남겨주세요'); }
}

// ===== 🧳 여행 브리핑 캐러셀 (드롭다운 대체 — 스냅 카드) =====
function splitEmoji(s){
  // 앞머리 이모지(있으면)와 본문 분리 — 유니코드 속성 정규식 없이 서로게이트로 안전 처리
  s = String(s || '');
  var i = 0;
  while (i < s.length) {
    var cp = s.codePointAt(i);
    if (cp >= 0x1F000 || (cp >= 0x2600 && cp <= 0x27BF) || cp === 0xFE0F || cp === 0x200D) { i += (cp > 0xFFFF ? 2 : 1); }
    else break;
  }
  var em = s.slice(0, i).trim();
  return { emoji: em, text: s.slice(i).trim() };
}
function tipRow(text, defEmoji){
  var sp = splitEmoji(text);
  return '<div class="tip"><span class="te">' + (sp.emoji || defEmoji) + '</span><span>' + esc(sp.text) + '</span></div>';
}

    '<div class="acc-b"><div class="acc-in">' + rows + '</div></div></div>';
}

// 로컬 테스트 모드: 서버 연동 전, 이 기기에 저장된 테스트 주문으로 흐름 체험
function findLocalOrder(code){
  var keys = ['jdisim_orders', 'esim_orders'];
  for (var k = 0; k < keys.length; k++) {
    try {
      var arr = JSON.parse(localStorage.getItem(keys[k]) || '[]');
      for (var i = 0; i < arr.length; i++) {
        if (arr[i] && arr[i].orderCode === code) return { store: keys[k], idx: i, o: arr[i] };
      }
    } catch (e) {}
  }
  return null;
}
function loadLocal(){
  var found = findLocalOrder(LOCAL);
  if (!found) return renderError('이 기기에서 주문을 찾지 못했어요', '테스트 주문은 결제했던 그 브라우저에서만 보여요. 실서비스에서는 카카오톡 링크로 어디서든 열립니다.');
  var o = found.o, it = (o.items && o.items[0]) || {};
  var created = o.createdAt ? new Date(o.createdAt) : new Date();
  var cty = countryFrom(it.productName, it.option, it.sku) || (it.productName || '').split(' ')[0];
  order = {
    orderCode: o.orderCode, buyerName: o.buyerName || '', productName: it.productName || '',
    option: it.option || '', sku: it.sku || '',
    quantity: it.quantity || 1, country: cty,
    validity: '구매일로부터 30일', status: it.lpa ? 'ISSUED' : 'PAID',
    autoIssueAt: new Date(created.getTime() + 7 * 86400000).toISOString(),
    iccid: it.iccid || '', lpa: it.lpa || '', carrier: it.carrier || ''
  };
  setModeChip('test');
  if (order.status === 'ISSUED') renderIssued(order.lpa, true);
  else renderPreIssue();
}

function attemptIssue(){
  var boxes=[$('agDevice'),$('agRefund')].filter(Boolean);
  var miss=boxes.filter(function(b){ return !b.querySelector('input').checked; });
  if(miss.length){
    miss[0].scrollIntoView({ behavior:'smooth', block:'center' });
    miss.forEach(function(b){ b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); });
    buzz(30); toast('필수 동의 2가지를 먼저 체크해 주세요');
    return;
  }
  // 체크 증빙 (2026-07-20): 체크 시각 + 꼭 확인 항목 수 — 발급 요청에 실어 서버 issue_log에 보존
  window.__issueAck = { at: new Date().toISOString(), n: window.__mustN || 0, device: true, refund: true };
  doIssue();
}

var seqTimers = [];
function seqUI(){
  h('<div class="card"><div class="seq-romi"><img src="images/fox-thinking.webp" alt="" onerror="this.parentElement.remove()"></div><div class="seq-t">발권하고 있어요</div>' +
    '<div class="sq run" id="sq0"><i></i>주문 확인</div>' +
    '<div class="sq" id="sq1"><i></i>통신사에 eSIM 프로필 요청</div>' +
    '<div class="sq" id="sq2"><i></i>QR 코드 생성</div>' +
    '<div class="center" style="margin-top:12px;"><span class="muted" id="seqMsg">보통 수 초, 길면 몇 분 — 화면을 닫지 마세요</span></div></div>');
  renderBottomBar('busy');
  seqTimers.forEach(clearTimeout); seqTimers = [];
  seqTimers.push(setTimeout(function(){ seqMark(0); }, 800));
  seqTimers.push(setTimeout(function(){
    var m = $('seqMsg'); if (m) m.textContent = '통신사 응답을 기다리는 중 — 결제는 안전하게 보존돼요';
  }, 9000));
}
function seqMark(i){
  var el = $('sq'+i); if (!el) return;
  el.classList.remove('run'); el.classList.add('done');
  var nx = $('sq'+(i+1)); if (nx && !nx.classList.contains('done')) nx.classList.add('run');
}
function seqFinish(then){
  seqTimers.forEach(clearTimeout);
  seqMark(0); seqMark(1);
  setTimeout(function(){ seqMark(2); }, 260);
  setTimeout(then, 780);
}

function doIssue(){
  seqUI();
  if (LOCAL){
    setTimeout(function(){
      var found = findLocalOrder(LOCAL);
      var lpa = 'LPA:1$rsp.test.jdisim$' + (order.iccid || String(Date.now()));
      if (found) {
        try {
          var arr = JSON.parse(localStorage.getItem(found.store) || '[]');
          if (arr[found.idx] && arr[found.idx].items && arr[found.idx].items[0]) {
            arr[found.idx].items[0].lpa = lpa;
            localStorage.setItem(found.store, JSON.stringify(arr));
          }
        } catch (e) {}
      }
      order.status = 'ISSUED';
      seqFinish(function(){ renderIssued(lpa, false); });
    }, 1400);
    return;
  }
  if (DEMO){ setTimeout(function(){ order.status='ISSUED'; seqFinish(function(){ renderIssued('LPA:1$rsp.example.com$DEMO0000DEMO0000DEMO0000DEMO0000', false); }); },1400); return; }
  if (CARE){
    // 케어 모드 발급 (2026-07-20): 발급하기 → 프록시 action=issue → 도매(도도매) issue-esim API 호출 → info 폴링으로 QR 수신
    var iq = CX ? ('action=issue&t=' + encodeURIComponent(CX)) : ('action=issue&iccid=' + encodeURIComponent(CARE));
    fetch(window.CARE_API + '?' + iq, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ ack: window.__issueAck || null }) })
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(d){
        if (d && d.error) throw d;
        pollCareIssue(0); // ISSUED(already)든 PENDING이든 info 폴링이 QR을 가져와 마무리
      })
      .catch(function(e){
        renderError('발급 요청이 접수되지 않았어요','결제와 주문은 안전하게 보존되어 있어요. 잠시 후 다시 시도하시거나 카톡 상담을 눌러주세요.');
      });
    return;
  }
  fetch(CONFIG.ISSUE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,agreedNoRefund:true,agreedDevice:true,agreedAt:new Date().toISOString()})})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){ if(d.lpa) seqFinish(function(){ renderIssued(d.lpa,false); }); else if(d.status==='PENDING') pollIssue(0); else throw 0; })
    .catch(function(){ renderError('발급 중 문제가 생겼어요','결제는 안전하게 보존되어 있어요. 잠시 후 다시 시도하시거나 카톡 상담을 눌러주세요.'); });
}

function pollCareIssue(n){
  if(n>40) return renderError('발급이 지연되고 있어요','통신사 응답 대기 중이에요. 이 페이지를 다시 열면 이어서 확인돼요 — 결제는 안전하게 보존됩니다.');
  setTimeout(function(){
    careGet(CX ? ('t=' + encodeURIComponent(CX)) : ('iccid=' + encodeURIComponent(CARE)))
      .then(function(d){
        var e = (d && d.esim) || {};
        if (e.qrCodeContent){
          order.status='ISSUED'; order.lpa=e.qrCodeContent;
          seqFinish(function(){ renderIssued(e.qrCodeContent, false); });
        } else pollCareIssue(n+1);
      })
      .catch(function(){ pollCareIssue(n+1); });
  }, 3000);
}

function pollIssue(n){
  if(n>40) return renderError('발급이 지연되고 있어요','완료되면 카톡으로 알려드릴게요 — 결제는 안전하게 보존됩니다.');
  setTimeout(function(){

      //   + P4 mcc→country(현지망 인텔리전스), status('2'=만료), listHistory(P3c 로미 닥터 판독)

      });

  fetch(CONFIG.USAGE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')).then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(renderUsage)

function maybeAutoActivate(d){
  // 사용 이력이 감지되면 개통 처리 자동화 → '여행 N일차 · 남은 X일' 즉시 계산
  try {
    var st = tripState();
    if (st.activatedAt) return;
    var used = Number(d && d.used_mb) || 0;
    var hasDaily = d && d.daily && d.daily.length;
    if (!used && !hasDaily && (d && d.status) !== 'active') return;
    var startIso = new Date().toISOString();
    if (hasDaily) {
      var first = d.daily.map(function(x){ return x.date; }).filter(Boolean).sort()[0];
      if (first) { var fd = new Date(first + 'T00:00:00'); if (!isNaN(fd)) startIso = fd.toISOString(); }

    st.installedAt = st.installedAt || startIso;
    st.activatedAt = startIso;
    saveTrip(st);
    renderInstallCard(); renderJourney(); renderRomi(); renderBottomBar(tripBarState());
    toast('현지 개통이 감지됐어요 — 남은 일수를 세어드릴게요 🛬');
  } catch(e){}
}

// ── 오늘 남은 데이터 (2026-07-18 사장님 지시) — 데일리 상품은 리셋 타임존 기준 '오늘'로 계산 ──
var TZ_OFF = {일본:9,한국:9,중국:8,홍콩:8,마카오:8,대만:8,몽골:8,싱가포르:8,말레이시아:8,필리핀:8,베트남:7,태국:7,캄보디아:7,라오스:7,인도네시아:7,몰디브:5,인도:5.5,스페인:1,유럽:0,영국:0,미국:-8,캐나다:-5,호주:10,뉴질랜드:12,괌:10,사이판:10};
function resetPlanInfo(){ // (2026-07-20 개명) 종전 이름 resetInfo가 913행 국가별 resetInfo(country)를 덮어써 RESET 셀·카운트다운·여정 문구를 무력화하던 충돌 해소
  try{
    var code = (order && order.sku) || PLAN;
    var R = window.JD_RESETS && code ? window.JD_RESETS.get(code) : null;
    if(!R || !R.data) return null;
    var m = /([가-힣]+)\s*(?:서부\s*)?시간\s*(\d{1,2}):(\d{2})/.exec(R.data);
    if(!m) return { txt: R.data };                      // '사용시점부터 24시간' 등 — 문구만 표시
    var off = TZ_OFF[m[1]]; if(off==null) return { txt: R.data };
    if(/서부/.test(R.data)) off = -8;
    if(/\(UTC\+0\)/.test(R.data)) off = 0;
    var out = { txt: R.data, off: off, hh: +m[2], mm: +m[3] };
    // 표시용: 여행국 현지시각으로 환산 (2026-07-20 사장님 지시) — 카운트다운 계산(off)은 기준시간 유지
    var dst = TZ_OFF[(order && order.country) || ''];
    if (dst != null) {
      var t = (out.hh*60 + out.mm + Math.round((dst - off)*60)) % 1440; if (t < 0) t += 1440;
      var h2 = ('0'+Math.floor(t/60)).slice(-2), m2 = ('0'+(t%60)).slice(-2);
      out.txtLocal = '현지시간 ' + h2 + ':' + m2 + ' 기준 변경';
    }
    return out;
  }catch(e){ return null; }
}
function quotaFromText(){
  // 일일 제공량: planOption(공급사) → 주문 옵션명 → 상품명 순으로 탐색
  var txt = [(window._planOption||''), (order&&order.option)||'', (order&&order.productName)||''].join(' ');
  var m = /매일\s*([\d.]+)\s*(GB|MB)/i.exec(txt) || /([\d.]+)\s*(GB|MB)\s*\+\s*[\d.]+\s*(?:M|K)bps/i.exec(txt);
  if(!m) return null;
  var mb = parseFloat(m[1]) * (/gb/i.test(m[2]) ? 1024 : 1);
  if(!mb) return null;
  var fup = /\+\s*[\d.]+\s*(?:m|k)bps|소진\s*후|저속|무제한/i.test(txt);
  return { mb: mb, fup: fup };
}
function tzToday(off){ return new Date(Date.now() + off*3600e3).toISOString().slice(0,10); }
function fmtDur(ms){ var h=Math.floor(ms/3600e3), mn=Math.round(ms%3600e3/60e3); return (h? h+'시간 ':'') + mn + '분'; }
function fmtData(mb, floor){ // 1GB 미만은 MB 표기 · floor=잔여(내림 — 쓴 만큼 즉시 줄어 보이게)
  if (mb < 1024) return (mb < 10 ? Math.round(mb*10)/10 : Math.round(mb)) + ' MB';
  var g = mb/1024;
  g = floor ? Math.floor(g*100)/100 : Math.round(g*100)/100;
  return g + ' GB';
}
function renderUsage(d){
  maybeAutoActivate(d);
  try { var L0 = d && (d.usageList || d.daily) || []; var t0 = 0; L0.forEach(function(x){ t0 += Number(x.used || x.used_mb || 0); }); if (t0) window._lastUsedGB = (Math.round(t0 / 1024 * 10) / 10) + 'GB'; } catch(e){}
  var box=$('usageBody');
  var used=Number(d.used_mb)||0, total=Number(d.total_mb)||0;
  var remain=Math.max(0,total-used);
  var pct= total? Math.min(100, used/total*100) : 0;
  // 데일리 상품: '오늘' = 리셋 타임존의 오늘 날짜 — 리셋 시각이 지나면 자동으로 0부터 (기록 자체가 새 날짜로 쌓임)
  var qi = quotaFromText(), ri = resetPlanInfo();
  var todayMb = 0;
  if (qi && d.daily && d.daily.length) {
    var srt = d.daily.slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });
    var last = srt[srt.length-1];
    var pd = (ri && ri.off != null) ? tzToday(ri.off) : tzToday(9);
    if (last.date === pd) todayMb = Number(last.mb) || 0;
  }
  if (qi) { remain = Math.max(0, qi.mb - todayMb); pct = Math.min(100, todayMb / qi.mb * 100); }
  var resetCard = '';
  window._usResetAt = null;
  if (qi) {
    var cd = '', pbHtml = '';
    if (ri && ri.off != null) {
      var shifted = Date.now() + ri.off*3600e3;
      var lo = new Date(shifted);
      var nx = Date.UTC(lo.getUTCFullYear(), lo.getUTCMonth(), lo.getUTCDate(), ri.hh, ri.mm||0);
      if (nx <= shifted) nx += 86400e3;
      var kh = ((ri.hh + 9 - ri.off) % 24 + 24) % 24;
      window._usResetAt = nx; window._usResetOff = ri.off;   // 라이브 카운트다운용
      cd = ' · 다음 리셋까지 <b id="usCd">' + fmtDur(nx - shifted) + '</b> (한국시간 ' + (kh<10?'0':'') + kh + ':' + (ri.mm<10?'0':'') + ri.mm + ')';
      pbHtml = '<div class="rs-bar"><i id="usPb" style="width:' + Math.min(100, Math.max(2, (1 - (nx - shifted) / 86400e3) * 100)) + '%"></i></div>';
    }
    resetCard = '<div class="rs-card" style="margin-top:9px;padding:10px 13px;">' +
      '<div style="font-weight:900;font-size:0.8rem;color:#0f766e;">⏱ 매일 데이터 리셋' + (ri && (ri.txtLocal || ri.txt) ? ' — ' + esc(ri.txtLocal || ri.txt) : '') + '</div>' +
      '<div style="font-size:0.75rem;font-weight:600;color:#475569;margin-top:3px;line-height:1.55;">리셋되면 다시 <b>' + fmtData(qi.mb) + '</b>를 쓸 수 있어요' + cd + '</div>' + pbHtml +
      (qi.fup ? '<div style="font-size:0.73rem;font-weight:600;color:#64748b;margin-top:5px;">오늘 용량을 다 써도 저속으로는 계속 이용할 수 있어요</div>' : '') + '</div>';
  }
  var C=2*Math.PI*56; // r=56 (컴팩트 도넛)
  if (window._usTimer) { clearInterval(window._usTimer); window._usTimer = null; }
  var lvCls = pct >= 90 ? ' lv3' : pct >= 70 ? ' lv2' : '';          // 게이지 경고색: 70% 앰버 · 90% 레드
  var pctTxt = (pct > 0 && pct < 1) ? '1% 미만' : Math.round(pct) + '%';  // 2MB 써도 '0%'로 보이지 않게
  var pctChip = (qi || total) ? '<span class="us-pct' + (pct >= 90 ? ' hot' : pct >= 70 ? ' warn' : '') + '">' + (qi ? '오늘 ' : '') + pctTxt + ' 사용</span>' : '';
  var todayKey = (ri && ri.off != null) ? tzToday(ri.off) : tzToday(9);
  function fmtDay(iso){ try { var dt = new Date(iso + 'T00:00:00'); if (isNaN(dt)) return iso; var w = ['일','월','화','수','목','금','토']; return (dt.getMonth()+1) + '/' + dt.getDate() + ' (' + w[dt.getDay()] + ')'; } catch(e){ return iso; } }
  var maxDay = Math.max.apply(null, (d.daily||[{mb:1}]).map(function(x){ return x.mb || 1; }));
  var dayRows = '';
  if (d.daily && d.daily.length) {
    var srt2 = d.daily.slice().sort(function(a, b){ return a.date < b.date ? 1 : -1; }); // 최신이 위
    dayRows = '<div style="font-weight:800;font-size:0.8rem;margin:14px 0 4px;">일별 사용 내역 <span class="muted" style="font-weight:700;">총 ' + srt2.length + '일</span></div>' +
      srt2.map(function(x){
        var isToday = x.date === todayKey;
        return '<div class="daybar' + (isToday ? ' today' : '') + '"><span class="d">' + fmtDay(x.date) +
          (x.country ? ' <span style="color:#1B8E82;font-weight:800;">' + esc(x.country) + '</span>' : '') + '</span>' +
          '<span class="bar"><i style="width:' + Math.max(4, Math.round((x.mb || 0) / maxDay * 100)) + '%"></i></span>' +
          '<span class="mb">' + fmtData(x.mb || 0) + '</span></div>';
      }).join('');
  }
  var nowT = new Date();
  var hh2 = function(n){ return (n < 10 ? '0' : '') + n; };
  var updAt = hh2(nowT.getHours()) + ':' + hh2(nowT.getMinutes());
  var badge = '<span class="badge '+(d.status==='active'?'ok':'wait')+'">'+(d.status==='active'?'사용 중':d.status==='expired'?'만료됨':'개통 대기')+'</span>';
  var kv = function(l, v, or){ return '<div class="us-kv"><span>' + l + '</span><b' + (or ? ' class="or"' : '') + '>' + v + '</b></div>'; };
  var statsHtml = qi
    ? kv('오늘 사용', fmtData(todayMb)) + kv('오늘 남음', fmtData(remain, true), true) + kv('여행 전체', fmtData(used))
    : total
    ? kv('사용한 데이터', fmtData(used)) + kv('남은 데이터', fmtData(remain, true), true)
    : kv('여행 전체 사용', fmtData(used)) + ((d.daily && d.daily.length) ? kv('측정일수', d.daily.length + '일') : '');
  box.style.textAlign='inherit';
  box.innerHTML =
    '<div class="us-top">' +
    '<div class="donut-wrap sm"><svg width="124" height="124" viewBox="0 0 124 124">' +
    '<defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F1690D"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>' +
    '<circle class="donut-bg" cx="62" cy="62" r="56"></circle>' +
    '<circle class="donut-fg' + lvCls + '" id="dfg" cx="62" cy="62" r="56" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle></svg>' +
    '<div class="donut-center"><span class="muted">'+(qi?'오늘 남은':total?'남은 데이터':'전체 사용')+'</span><span class="big">'+(qi? fmtData(remain,true) : total? fmtData(remain,true) : (used? fmtData(used) : '0 GB'))+'</span></div></div>' +
    '<div class="us-stats"><div class="us-chips">' + badge + pctChip + '</div>' + statsHtml + '</div></div>' +
    ((d.country && d.status!=='expired')? '<div style="margin-top:9px;"><span style="display:inline-block;font-size:0.74rem;font-weight:800;color:#1B8E82;background:rgba(43,179,163,0.1);padding:5px 12px;border-radius:999px;">📍 '+esc(d.country)+' 현지망 접속 확인 ✓</span></div>' : '') +
    (function(){ var dg=diagHistory(d.listHistory); if(!dg) return ''; var col=dg.t==='bad'?['#b91c1c','rgba(239,68,68,0.08)','#fecaca']:dg.t==='warn'?['#9a5b16','rgba(241,105,13,0.08)','#fed7aa']:['#15803d','rgba(34,197,94,0.08)','#bbf7d0']; var ic=dg.t==='bad'?'⚠️':dg.t==='warn'?'🔧':'✅'; return '<div style="margin-top:9px;background:'+col[1]+';border:1px solid '+col[2]+';border-radius:12px;padding:10px 13px;text-align:left;"><div style="font-weight:900;font-size:0.8rem;color:'+col[0]+';">'+ic+' '+esc(dg.title)+'</div><div style="font-size:0.74rem;font-weight:600;color:#475569;margin-top:2px;line-height:1.5;">'+esc(dg.msg)+'</div></div>'; })() +
    resetCard +
    dayRows +
    '<div class="us-note">' +
    '<button class="btn btn-ghost" style="width:100%;" onclick="loadUsage()">↻ 새로고침</button>' +
    '<span class="cap">공급사 집계 기준 · 반영까지 시간이 걸릴 수 있어요 · 조회 ' + updAt + '</span></div>';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ var el=$('dfg'); if(el) el.style.strokeDashoffset = String(C*(1-pct/100)); }); });
  // 라이브 카운트다운 (30초 갱신) — 리셋 시각 도달 시 자동 재조회 = "리셋마다 초기화"가 화면에서도 실시간
  if (window._usResetAt) {
    window._usTimer = setInterval(function(){
      var el = document.getElementById('usCd'); if (!el) return;
      var left = window._usResetAt - (Date.now() + window._usResetOff * 3600e3);
      if (left <= 0) { clearInterval(window._usTimer); window._usTimer = null; loadUsage(); return; }
      el.textContent = fmtDur(left);
      var pb = document.getElementById('usPb'); if (pb) pb.style.width = Math.min(100, Math.max(2, (1 - left / 86400e3) * 100)) + '%';
    }, 30000);
  }
}

function renderError(title,msg){
  h('<div class="card center" style="padding:28px 20px;"><img src="images/fox-thinking.webp" alt="" style="width:64px;" onerror="this.style.display=\'none\'"><div style="font-weight:900;font-size:1.05rem;margin-top:10px;">'+esc(title)+'</div><div class="muted" style="margin-top:7px;">'+esc(msg)+'</div></div>');
  renderBottomBar('error');
}

loadOrder();

<script>
function openSignalFix(){
  var old = document.getElementById('sfxOverlay');
  if (old) { old.style.display = 'flex'; return; }
  var ov = document.createElement('div');
  ov.id = 'sfxOverlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:650;display:flex;align-items:flex-end;justify-content:center;';
  ov.innerHTML = '<div style="background:#FFFDFB;border-radius:22px 22px 0 0;width:min(560px,100%);max-height:86vh;overflow-y:auto;padding:20px 18px calc(24px + env(safe-area-inset-bottom,0px));">' +
    '<div style="display:flex;justify-content:flex-end;margin-bottom:2px;"><button onclick="document.getElementById(\'sfxOverlay\').style.display=\'none\'" style="border:none;background:#F1F5F9;border-radius:50%;width:32px;height:32px;font-weight:900;cursor:pointer;">✕</button></div>' +
    '<div id="sfxMount"></div></div>';
  ov.addEventListener('click', function(e){ if (e.target === ov) ov.style.display = 'none'; });
  document.body.appendChild(ov);
  var opt = '';
  try { opt = (typeof order !== 'undefined' && order && (order.option || order.sku)) || ''; } catch(e){}
  if (window.RomiSignalFix) RomiSignalFix.mount(document.getElementById('sfxMount'), { opt: opt });
}

// ===== ROMI Doctor 원탭 진단 =====
function runDiagnose(){
  var old = document.getElementById('rdOverlay');
  if (old) old.remove();
  var ov = document.createElement('div');
  ov.id = 'rdOverlay';
  ov.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:650;display:flex;align-items:flex-end;justify-content:center;';
  ov.innerHTML = '<div style="background:#FFFDFB;border-radius:22px 22px 0 0;width:min(560px,100%);max-height:86vh;overflow-y:auto;padding:20px 18px calc(24px + env(safe-area-inset-bottom,0px));font-family:inherit;">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><b style="font-size:1rem;">🔍 로미 닥터 원클릭 진단</b>' +
    '<button onclick="document.getElementById(\'rdOverlay\').remove()" style="border:none;background:#F1F5F9;border-radius:50%;width:32px;height:32px;font-weight:900;cursor:pointer;">✕</button></div>' +
    '<div id="rdBody" style="text-align:center;padding:26px 0;font-weight:800;color:#64748b;">진단 중… 상태·경로·통신을 확인하고 있어요 🦊</div></div>';
  ov.addEventListener('click', function(e){ if (e.target === ov) ov.remove(); });
  document.body.appendChild(ov);

  var iccid = '', cty = '', optRaw = '';
  try {
    iccid = (typeof order !== 'undefined' && order && order.iccid) || '';
    cty = (order && order.country) || '';
    optRaw = (order && (order.option || order.sku)) || '';
  } catch(e){}
  var t0 = Date.now();
  var api = (window.CARE_API ? CARE_API.replace('/api/esim', '/api/diagnose') : 'https://jdisim-proxy.vercel.app/api/diagnose');

  // 상품 프리픽스로 망종류(로밍/로컬)·APN을 찾아 동봉 → 로밍망 경유지(홍콩/중국) 오진 방지
  var mm = String(optRaw).match(/([A-Za-z]{2,6})_[^\s\/|,)]+?_\d{1,3}일/);
  var prefix = mm ? mm[1].toUpperCase() : (String(optRaw).split('_')[0] || '').toUpperCase();
  fetch('/signal-map.json').then(function(r){ return r.ok ? r.json() : {}; }).catch(function(){ return {}; })
  .then(function(map){
    var info = map[prefix] || {};
    return fetch(api, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ iccid: iccid, country: cty || info.c || '',
                             nw: info.nw || '', apn: info.apn || '', prefix: prefix }) });
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    var ms = Date.now() - t0;
    var v = d.verdict || {}; var f = d.facts || {};
    var actBtn = '';
    if (v.next === 'signalfix') actBtn = '<button onclick="document.getElementById(\'rdOverlay\').remove();openSignalFix()" style="width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#F1690D,#F59E0B);color:#fff;font-family:inherit;font-weight:900;font-size:.9rem;cursor:pointer;">📶 시그널 리셋 바로 시작</button>';
    else if (v.next === 'usage') actBtn = '<button onclick="document.getElementById(\'rdOverlay\').remove();goUsage()" style="width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#F1690D,#F59E0B);color:#fff;font-family:inherit;font-weight:900;font-size:.9rem;cursor:pointer;">📊 사용량 확인</button>';
    else if (v.next === 'redo') actBtn = '<button onclick="runDiagnose()" style="width:100%;margin-top:12px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#F1690D,#F59E0B);color:#fff;font-family:inherit;font-weight:900;font-size:.9rem;cursor:pointer;">와이파이 껐어요 — 다시 진단</button>';

    var facts = '';
    if (f.access) facts += '<div style="font-size:.7rem;color:#94a3b8;font-weight:700;margin-top:10px;">접속 경로: ' + (f.access.country||'?') + (f.access.isp ? ' · ' + f.access.isp : '') + ' · 응답 ' + ms + 'ms' +
      (f.esim && f.esim.totalMb ? ' · 데이터 ' + Math.round(f.esim.usedMb||0) + '/' + Math.round(f.esim.totalMb) + 'MB' : '') + '</div>';

    document.getElementById('rdBody').style.cssText = 'text-align:left;padding:4px 0 6px;';
    document.getElementById('rdBody').innerHTML =
      '<div style="background:#fff;border:1.5px solid #F0E8E0;border-radius:16px;padding:16px;">' +
      '<div style="font-size:1rem;font-weight:900;margin-bottom:6px;">' + (v.title || '진단 결과') + '</div>' +
      '<div style="font-size:.82rem;color:#4b5563;font-weight:600;line-height:1.65;">' + (v.why || '') + '</div>' +
      '<div style="margin-top:10px;background:#FFF8F2;border-radius:12px;padding:12px;font-size:.82rem;font-weight:800;">👉 ' + (v.action || '') + '</div>' +
      actBtn + facts + '</div>';
  })
  .catch(function(){
    document.getElementById('rdBody').innerHTML = '데이터 연결 자체가 막혀 있어요.<br><span style="font-size:.78rem;font-weight:700;">와이파이를 잠깐 켜고 다시 진단하거나, 시그널 리셋을 진행해 주세요.</span>' +
      '<button onclick="document.getElementById(\'rdOverlay\').remove();openSignalFix()" style="width:100%;margin-top:14px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#F1690D,#F59E0B);color:#fff;font-family:inherit;font-weight:900;cursor:pointer;">📶 시그널 리셋 시작</button>';
  });
}

<!-- ROMI Mode 위젯 (여행모드/한국모드 — 구매자 전용, 비구매자 자동 숨김) -->
<script src="romi-mode.js?v=20260719a"></script>
<script>
  // gateParams: aligo_bridge v6.3 실측 — care(항상) / o / n / bd / plan(조건부) + local(내 여행 카드 → 이 기기 주문). 하나라도 있으면 구매자 판정.
  RomiMode.init({ gateParams: ['care', 'cx', 'o', 'n', 'bd', 'plan', 'local'] });
  // 로미 챗봇 로드 (발급링크에서도 상담 가능)
  // ⚠️ 기존엔 이 코드가 </html> 뒤 생텍스트로 있어 화면에 노출 + 챗봇 미로드 — 2026-07-14 수정
  (function(){ var sc = document.createElement('script'); sc.src = 'romi-bot.js?v=20260719a'; sc.defer = true; document.body.appendChild(sc); })();

  // 퍼널 KPI (Phase 2): 케어링크 오픈 1회 기록 — 베스트에포트, 개인정보 비전송 (구형 care= raw ICCID는 'legacy'로 익명화)
  (function(){ try {
    var q = new URLSearchParams(location.search);
    var tok = q.get('cx') || q.get('t') || q.get('o');
    var id = tok ? String(tok).slice(0, 12) : (q.get('care') ? 'legacy' : (q.get('local') ? 'local' : ''));
    if (!id || sessionStorage.getItem('jd_clo')) return;
    sessionStorage.setItem('jd_clo', '1');
    fetch('https://jdisim-proxy.vercel.app/api/jdios/event', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ order_id: id, event_type: 'CARE_LINK_OPENED' }) }).catch(function(){});
  } catch (e) {} })();
</script>
