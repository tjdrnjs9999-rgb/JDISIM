// 진행 스트립 (0=결제,1=발급,2=설치,3=개통)
function flowStrip(step){
  var labels=['결제 완료','eSIM 발급','기기에 설치','현지 개통'];
  var out='<div class="flow">';
  for(var i=0;i<4;i++){
    var cls = i<step?'done':(i===step?'now':'');
    if(i) out += '<div class="ln '+(i<=step-0? (i<step?'done':''):'')+'"></div>';
    out += '<div class="fs '+cls+'"><div class="dot">'+(i<step?'✓':(i+1))+'</div><div class="lb">'+labels[i]+'</div></div>';
  }
  return out+'</div>';
}

function confetti(){
  if (window.matchMedia && matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var colors=['#F97316','#F59E0B','#fbbf24','#fff','#4ade80'];
  for(var i=0;i<30;i++){
    var c=document.createElement('span');
    c.className='cf';
    c.style.cssText+='left:'+Math.random()*100+'%;width:'+(6+Math.random()*5)+'px;height:'+(9+Math.random()*6)+'px;background:'+colors[i%colors.length]+';animation-duration:'+(2.2+Math.random()*1.5)+'s;animation-delay:'+Math.random()*0.7+'s;';
    document.body.appendChild(c);
    setTimeout(function(el){ return function(){ el.remove(); }; }(c), 4500);
  }
}

// ===== 🛫 여행 카운터 (자가신고 기반 — 서버·도매처 API 불필요) =====
function planDays(){
  var m = String((order && order.productName) || '').match(/(\d+)\s*일/);
  return m ? parseInt(m[1], 10) : 0;
}
function tripState(){
  try { return JSON.parse(localStorage.getItem('jd_trip_' + ((order && order.orderCode) || 'x')) || '{}'); } catch (e) { return {}; }
}
function saveTrip(st){
  try { localStorage.setItem('jd_trip_' + ((order && order.orderCode) || 'x'), JSON.stringify(st)); } catch (e) {}
}
function tripStep(){
  var st = tripState();
  if (st.activatedAt) return 3;   // 현지 개통
  if (st.installedAt) return 2;   // 설치 완료 (다음: 개통)
  return 2;                        // 발급 완료 상태의 기본
}
function markInstalled(){
  var st = tripState(); st.installedAt = st.installedAt || new Date().toISOString(); saveTrip(st);
  renderTripCard(); confetti();
}
function markActivated(){
  var st = tripState();
  st.installedAt = st.installedAt || new Date().toISOString();
  st.activatedAt = st.activatedAt || new Date().toISOString();
  saveTrip(st); renderTripCard(); confetti();
}
function tripCardHTML(){ return '<div class="card" id="tripCard"></div>'; }
function renderTripCard(){
  var box = $('tripCard'); if (!box) return;
  var st = tripState(), days = planDays();
  if (!st.installedAt) {
    box.innerHTML = '<div style="font-weight:800;font-size:0.92rem;">🛫 내 여행 카운터</div>' +
      '<div class="muted" style="margin:3px 0 10px;">설치를 마치셨다면 알려주세요 — 여행 일정에 맞춰 챙겨드릴게요</div>' +
      '<button class="btn btn-ghost" onclick="markInstalled()">📲 설치 완료했어요</button>';
    return;
  }
  if (!st.activatedAt) {
    box.innerHTML = '<div style="font-weight:800;font-size:0.92rem;">🛫 내 여행 카운터</div>' +
      '<div class="notice" style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.3);color:#15803d;margin-top:8px;">✅ 설치 완료! 이제 여행만 남았어요.<br>현지에 도착해 <strong>데이터 로밍을 켠 순간</strong> 아래 버튼을 눌러주세요 — 남은 일수를 세어드릴게요.</div>' +
      '<button class="btn btn-primary" style="margin-top:10px;" onclick="markActivated()">🛬 현지 도착 · 개통했어요!</button>';
    return;
  }
  // 개통 후: 잔여일 게이지
  var start = new Date(st.activatedAt);
  var used = Math.floor((Date.now() - start.getTime()) / 86400000) + 1; // 개통일 = 1일차
  var left = days ? Math.max(0, days - used) : 0;
  var pct = days ? Math.min(100, Math.round(used / days * 100)) : 0;
  var barColor = !days ? '#22c55e' : (left <= 1 ? '#ef4444' : left <= 2 ? '#f59e0b' : '#22c55e');
  box.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:baseline;">' +
      '<div style="font-weight:800;font-size:0.92rem;">🛬 여행 ' + used + '일차</div>' +
      (days ? '<div style="font-weight:900;font-size:1rem;color:' + barColor + ';">' + (left > 0 ? '남은 ' + left + '일' : '오늘 만료') + '</div>' : '') + '</div>' +
    (days ? '<div style="margin-top:10px;height:9px;border-radius:6px;background:#f1f5f9;overflow:hidden;"><div style="width:' + pct + '%;height:100%;border-radius:6px;background:' + barColor + ';transition:width 0.8s;"></div></div>' +
      '<div class="muted" style="margin-top:7px;">' + (order.productName || '') + ' · ' + new Date(st.activatedAt).toLocaleDateString('ko-KR') + ' 개통</div>' : '') +
    '<div class="muted" style="margin-top:6px;">💡 일 용량 상품은 매일 자정(현지 기준) 고속 데이터가 새로 채워져요</div>' +
    (days && left <= 2 ? '<a class="btn btn-primary" style="margin-top:11px;" href="https://jdisim.co.kr/mobile.html" target="_blank" rel="noopener">🔋 여행이 더 길어졌나요? 연장 eSIM 3초 주문 →</a>' : '');
}

// 로컬 테스트 모드: 서버 연동 전, 이 기기에 저장된 테스트 주문으로 흐름 체험
function findLocalOrder(code){
  var keys = ['jdisim_orders', 'esim_orders'];
  for (var k = 0; k < keys.length; k++) {
    try {
      var arr = JSON.parse(localStorage.getItem(keys[k]) || '[]');
      for (var i = 0; i < arr.length; i++) {
        if (arr[i] && arr[i].orderCode === code) return { store: keys[k], idx: i, o: arr[i] };
      }
    } catch (e) {}
  }
  return null;
}

// 케어 모드: ICCID로 eSIM 정보 조회해 '내 여행 티켓' 표시 (도매처 발급링크와 동일 기능 + 우리 케어)
function careGet(query){
  // 프록시 경유 (CORS 안전). window.CARE_API = 'https://.../api/esim'
  var base = window.CARE_API;
  if (!base) return Promise.reject('no proxy');
  return fetch(base + '?' + query).then(function(r){ if(!r.ok) throw 0; return r.json(); });
}

function loadCare(){
  careGet('iccid=' + encodeURIComponent(CARE))
    .then(function(d){
      var e = (d && d.esim) || {};
      if (!e.iccid && !e.qrCodeContent) return renderError('eSIM 정보를 찾지 못했어요', '카톡 상담으로 도와드릴게요.');
      order = {
        orderCode: e.orderCode || '', buyerName: '', productName: e.prodName || '',
        quantity: parseInt(e.count||'1',10)||1, country: (e.prodName||'').split(' ')[0],
        validity: '', status: 'ISSUED', iccid: e.iccid || CARE,
        lpa: e.qrCodeContent || '', storeId: d.storeId
      };

function doIssue(){
  h('<div class="card center"><div class="spin"></div><div style="font-weight:800;font-size:0.9rem;">통신사에서 QR코드를 만들고 있어요</div><div class="muted" style="margin-top:4px;">보통 수 초, 길면 몇 분 — 화면을 닫지 마세요</div></div>');
  if (LOCAL){
    setTimeout(function(){
      var found = findLocalOrder(LOCAL);
      var lpa = 'LPA:1$rsp.test.jdisim$' + (order.iccid || String(Date.now()));
      if (found) {
        try {
          var arr = JSON.parse(localStorage.getItem(found.store) || '[]');
          if (arr[found.idx] && arr[found.idx].items && arr[found.idx].items[0]) {
            arr[found.idx].items[0].lpa = lpa;
            localStorage.setItem(found.store, JSON.stringify(arr));
          }
        } catch (e) {}
      }
      order.status = 'ISSUED';
      renderIssued(lpa, false);
      document.getElementById('app').insertAdjacentHTML('afterbegin', localBanner());
    }, 1600);
    return;
  }
  if (DEMO){ setTimeout(function(){ order.status='ISSUED'; renderIssued('LPA:1$rsp.billionconnect.com$F8B7C1B0B68F4AB889460F568F1F13D7', false); },1600); return; }
  fetch(CONFIG.ISSUE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,agreedNoRefund:true,agreedDevice:true,agreedAt:new Date().toISOString()})})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){ if(d.lpa) renderIssued(d.lpa,false); else if(d.status==='PENDING') pollIssue(0); else throw 0; })
    .catch(function(){ renderError('발급 중 문제가 생겼어요','결제는 안전하게 보존되어 있어요. 잠시 후 다시 시도하시거나 카톡 상담을 눌러주세요.'); });
}
function pollIssue(n){
  if(n>40) return renderError('발급이 지연되고 있어요','완료되면 카톡으로 알려드릴게요 — 결제는 안전하게 보존됩니다.');
  setTimeout(function(){
    fetch(CONFIG.ORDER_API+'?token='+encodeURIComponent(token)).then(function(r){return r.json();})
      .then(function(d){ if(d.status==='ISSUED'&&d.lpa) renderIssued(d.lpa,false); else pollIssue(n+1); })
      .catch(function(){ pollIssue(n+1); });
  },3000);
}

function loadUsage(){
  var box=$('usageBody');
  box.innerHTML='<div class="muted" style="padding:14px 0;">⏳ 조회 중...</div>';
  if (DEMO){ return renderUsage({used_mb:126,total_mb:2048,status:'active',daily:[{date:'2026-07-09',mb:126}]}); }
  if (CARE && window.CARE_API){
    fetch(window.CARE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')+'&action=usage').then(function(r){return r.json();}).then(function(d){
      var lst = (d && d.usageList) || [];
      if (!lst.length){
        box.innerHTML='<div class="notice" style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);color:#1d4ed8;text-align:left;">ℹ️ 아직 사용량 기록이 없어요.<br>무제한 요금제이거나 현지에서 아직 개통 전일 수 있어요. 개통 후 다시 눌러보세요!<br><span style="color:#64748b;">정확한 사용량은 설정 → 셀룰러 → 해당 회선에서도 볼 수 있어요.</span></div>';
        return;
      }
      // usageList가 채워지면 표준 포맷으로 변환해 도넛 렌더
      var used=0,total=0,daily=[];
      lst.forEach(function(r){ var mb=Number(r.used||r.usedMb||r.dataUsed||0); used+=mb; if(r.date||r.useDate)daily.push({date:r.date||r.useDate,mb:mb}); if(r.total||r.totalMb)total=Number(r.total||r.totalMb); });
      renderUsage({used_mb:used,total_mb:total,status:'active',daily:daily});
    }).catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;text-align:left;">조회에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
    return;
  }
  if (!CONFIG.USAGE_API){ box.innerHTML='<div class="notice" style="background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.2);color:#9a5b16;text-align:left;">🛠️ 실시간 사용량 조회는 곧 오픈돼요!<br>지금은 설정 → 셀룰러 → 해당 회선에서 확인할 수 있어요</div>'; return; }
  fetch(CONFIG.USAGE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')).then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(renderUsage)
    .catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;text-align:left;">조회에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
}

function renderUsage(d){
  var box=$('usageBody');
  var used=Number(d.used_mb)||0, total=Number(d.total_mb)||0;
  var remain=Math.max(0,total-used);
  var pct= total? Math.min(100, used/total*100) : 0;
  var C=2*Math.PI*72; // r=72
  var maxDay = Math.max.apply(null, (d.daily||[{mb:1}]).map(function(x){return x.mb||1;}));
  box.style.textAlign='inherit';
  box.innerHTML =
    '<div class="donut-wrap"><svg width="172" height="172" viewBox="0 0 172 172">' +
    '<defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F97316"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>' +
    '<circle class="donut-bg" cx="86" cy="86" r="72"></circle>' +
    '<circle class="donut-fg" id="dfg" cx="86" cy="86" r="72" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle></svg>' +
    '<div class="donut-center"><span class="muted">현재 남은 데이터</span><span class="big">'+(total? gb(remain)+' GB' : '무제한 ♾️')+'</span>' +
    '<span class="badge '+(d.status==='active'?'ok':'wait')+'">'+(d.status==='active'?'● 사용 중':d.status==='expired'?'만료됨':'개통 대기')+'</span></div></div>' +
    (total? '<div class="pillstat"><div><div class="l">사용한 데이터</div><div class="v">'+gb(used)+' GB</div></div><div><div class="l">남은 데이터</div><div class="v" style="color:#F2751F;">'+gb(remain)+' GB</div></div></div>' : '') +
    ((d.daily&&d.daily.length)? '<div style="font-weight:800;font-size:0.8rem;margin:14px 0 4px;">일별 사용 내역 <span class="muted">총 '+d.daily.length+'일</span></div>' +
      d.daily.map(function(x){ return '<div class="daybar"><span class="d">'+esc(x.date)+'</span><span class="bar"><i style="width:'+Math.max(4,Math.round((x.mb||0)/maxDay*100))+'%"></i></span><span class="mb">'+(x.mb>=1024? gb(x.mb)+'GB' : Math.round(x.mb)+'MB')+'</span></div>'; }).join('') : '') +
    '<button class="btn btn-ghost" style="margin-top:12px;" onclick="loadUsage()">🔄 새로고침</button>';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ var el=$('dfg'); if(el) el.style.strokeDashoffset = String(C*(1-pct/100)); }); });
}

function renderError(title,msg){
  h('<div class="card center"><div style="font-size:2rem;">🦊</div><div style="font-weight:800;margin-top:6px;">'+esc(title)+'</div><div class="muted" style="margin-top:6px;line-height:1.7;">'+esc(msg)+'</div><div style="height:14px;"></div><a class="btn btn-primary" href="https://pf.kakao.com/_GSixcn/chat" target="_blank" rel="noopener">💬 카톡 상담 바로 연결</a></div>');
}

loadOrder();
</script>
</body>
</html>
