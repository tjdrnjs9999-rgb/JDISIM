<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0B1430">
<title>eSIM 발급 — JDISIM</title>
<meta name="robots" content="noindex">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html { font-size:17px; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:linear-gradient(180deg,#fdfefe,#f4f6fa); min-height:100dvh; color:#0f172a; -webkit-font-smoothing:antialiased; word-break:keep-all; overflow-wrap:break-word; }
  ::selection { background:rgba(249,115,22,0.22); }

  /* ============ 밤하늘 발권 카운터 헤더 ============ */
  .sky { position:relative; background:linear-gradient(180deg,#070D22 0%,#0B1430 42%,#182552 78%,#2A3B6E 100%); padding:calc(14px + env(safe-area-inset-top,0px)) 0 86px; overflow:hidden; }
  .sky::after { content:''; position:absolute; left:0; right:0; bottom:0; height:64px; background:linear-gradient(180deg,transparent,rgba(249,115,22,0.16) 55%,rgba(249,115,22,0.32)); pointer-events:none; }
  .stars { position:absolute; inset:0; pointer-events:none; background-repeat:no-repeat; }
  .stars.s1 { background-image:
    radial-gradient(1.2px 1.2px at 8% 22%, #fff 60%, transparent),
    radial-gradient(1px 1px at 21% 64%, rgba(255,255,255,0.9) 60%, transparent),
    radial-gradient(1.4px 1.4px at 33% 18%, #fff 60%, transparent),
    radial-gradient(1px 1px at 47% 48%, rgba(255,255,255,0.8) 60%, transparent),
    radial-gradient(1.3px 1.3px at 62% 12%, #fff 60%, transparent),
    radial-gradient(1px 1px at 71% 56%, rgba(255,255,255,0.85) 60%, transparent),
    radial-gradient(1.5px 1.5px at 84% 26%, #fff 60%, transparent),
    radial-gradient(1px 1px at 93% 62%, rgba(255,255,255,0.8) 60%, transparent);
    animation:tw 3.4s ease-in-out infinite; }
  .stars.s2 { background-image:
    radial-gradient(1px 1px at 14% 40%, rgba(255,255,255,0.85) 60%, transparent),
    radial-gradient(1.3px 1.3px at 27% 10%, #fff 60%, transparent),
    radial-gradient(1px 1px at 41% 70%, rgba(255,255,255,0.75) 60%, transparent),
    radial-gradient(1.2px 1.2px at 55% 30%, #fff 60%, transparent),
    radial-gradient(1px 1px at 67% 76%, rgba(255,255,255,0.8) 60%, transparent),
    radial-gradient(1.2px 1.2px at 78% 8%, #fff 60%, transparent),
    radial-gradient(1px 1px at 90% 44%, rgba(255,255,255,0.85) 60%, transparent);
    animation:tw 4.6s ease-in-out infinite 1.4s; }
  @keyframes tw { 0%,100% { opacity:0.55; } 50% { opacity:1; } }
  .sky-in { position:relative; max-width:440px; margin:0 auto; padding:0 20px; }
  .sky .brand { display:flex; align-items:center; gap:10px; }
  .sky .brand-badge { width:36px; height:36px; border-radius:11px; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-weight:900; font-size:1.1rem; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(249,115,22,0.45); }
  .sky .brand b { display:block; color:#fff; font-size:1.02rem; letter-spacing:0.6px; line-height:1.15; }
  .sky .brand i { display:block; font-style:normal; color:#8FA3D9; font-size:0.66rem; font-weight:800; letter-spacing:2.2px; }

  /* 비행 경로 */
  .route { display:flex; align-items:flex-end; gap:6px; margin-top:22px; }
  .ap { flex-shrink:0; text-align:center; min-width:64px; }
  .ap b { display:block; color:#fff; font-size:1.72rem; font-weight:900; letter-spacing:1px; line-height:1; font-variant-numeric:tabular-nums; }
  .ap i { display:block; font-style:normal; color:#8FA3D9; font-size:0.64rem; font-weight:800; letter-spacing:1.5px; margin-top:5px; }
  .ap .fl { font-size:0.95rem; margin-right:3px; vertical-align:-1px; }
  .arc { flex:1; height:52px; min-width:0; overflow:visible; margin-bottom:2px; }
  .arc .base { stroke:rgba(143,163,217,0.28); stroke-width:1.6; stroke-dasharray:2 6; stroke-linecap:round; }
  .arc .glow { stroke:url(#agrad); stroke-width:2; stroke-dasharray:6 8; stroke-linecap:round; animation:dash 1.6s linear infinite; opacity:0; transition:opacity 0.6s; }
  .route.go .glow { opacity:1; }
  @keyframes dash { to { stroke-dashoffset:-28; } }
  .arc .pl { font-size:13px; opacity:0; }
  .route.go .pl { opacity:1; }
  @media (prefers-reduced-motion:reduce) { .arc .glow { animation:none; } .arc .pl { display:none; } .stars { animation:none !important; } }

  /* ============ 본문 ============ */
  .wrap { max-width:440px; margin:-64px auto 0; position:relative; padding:0 16px calc(34px + env(safe-area-inset-bottom,0px)); }
  .card { background:#fff; border:1px solid #eef2f7; border-radius:18px; padding:16px; box-shadow:0 8px 24px rgba(15,23,42,0.05); margin-bottom:12px; animation:rise 0.55s cubic-bezier(0.16,1,0.3,1) both; }
  .card:nth-of-type(2){animation-delay:0.07s}.card:nth-of-type(3){animation-delay:0.14s}.card:nth-of-type(4){animation-delay:0.21s}
  @keyframes rise { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:none; } }

  /* ============ 보딩패스 티켓 ============ */
  .bpass { position:relative; background:#FFFDF9; border-radius:20px; box-shadow:0 18px 44px rgba(11,20,48,0.22), 0 3px 10px rgba(11,20,48,0.12); margin-bottom:14px; animation:rise 0.6s cubic-bezier(0.16,1,0.3,1) both; overflow:hidden; }
  .bpass::after { content:''; position:absolute; inset:0; background:linear-gradient(115deg,transparent 30%,rgba(255,255,255,0.55) 46%,rgba(255,214,165,0.25) 52%,transparent 66%); transform:translateX(-120%); animation:holo 5.2s ease-in-out infinite 1.2s; pointer-events:none; }
  @keyframes holo { 0%,55% { transform:translateX(-120%); } 78%,100% { transform:translateX(120%); } }
  .bp-top { display:flex; justify-content:space-between; align-items:center; background:linear-gradient(120deg,#F97316,#F59E0B); padding:9px 16px; }
  .bp-top span { color:#fff; font-size:0.62rem; font-weight:900; letter-spacing:2.6px; }
  .badge { font-size:0.64rem; font-weight:900; padding:4px 10px; border-radius:11px; }
  .badge.ok { color:#fff; background:rgba(255,255,255,0.24); border:1px solid rgba(255,255,255,0.5); }
  .badge.wait { color:#7c3a00; background:#FFE9CF; }
  .bp-main { padding:15px 16px 13px; }
  .bp-dest { display:flex; align-items:center; gap:10px; }
  .bp-dest .flag { font-size:2rem; line-height:1; filter:drop-shadow(0 3px 6px rgba(15,23,42,0.18)); }
  .bp-dest .nm { min-width:0; }
  .bp-dest .nm b { display:block; font-size:1.32rem; font-weight:900; letter-spacing:-0.4px; line-height:1.2; }
  .bp-dest .nm i { display:block; font-style:normal; color:#64748b; font-size:0.78rem; font-weight:700; margin-top:2px; word-break:keep-all; }
  .bp-perf { position:relative; border-top:2px dashed #EAD9C6; margin:13px -16px 12px; }
  .bp-perf::before, .bp-perf::after { content:''; position:absolute; top:-9px; width:18px; height:18px; border-radius:50%; background:#f4f6fa; box-shadow:inset 0 2px 4px rgba(11,20,48,0.1); }
  .bp-perf::before { left:-9px; } .bp-perf::after { right:-9px; }
  .bp-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px 12px; }
  .bp-grid .f.w2 { grid-column:1 / -1; }
  .bp-grid .f .k { font-size:0.58rem; font-weight:900; letter-spacing:1.6px; color:#A28D75; }
  .bp-grid .f .v { font-size:0.86rem; font-weight:800; margin-top:2px; word-break:keep-all; overflow-wrap:anywhere; line-height:1.4; }
  .bp-grid .f .v.code { font-family:ui-monospace,Menlo,monospace; font-size:0.7rem; font-weight:700; letter-spacing:0.4px; word-break:break-all; line-height:1.55; color:#334155; }
  .bp-bar { margin-top:12px; }
  .barcode { height:26px; border-radius:2px; opacity:0.85; background:repeating-linear-gradient(90deg,#0f172a 0 1.5px,transparent 1.5px 3.5px,#0f172a 3.5px 6px,transparent 6px 7px,#0f172a 7px 8px,transparent 8px 11px); }
  .bp-code { text-align:center; font-family:ui-monospace,Menlo,monospace; font-size:0.66rem; font-weight:700; letter-spacing:3px; color:#94a3b8; margin-top:5px; }

  /* 발권 프린트 애니메이션 */
  .print-slot { height:10px; border-radius:6px; background:linear-gradient(180deg,#1B2C55,#0B1430); box-shadow:inset 0 2px 5px rgba(0,0,0,0.55), 0 2px 6px rgba(11,20,48,0.25); margin:2px 26px 10px; }
  .bpass.printing { animation:printOut 1.05s cubic-bezier(0.25,0.9,0.3,1) 0.15s both; }
  @keyframes printOut { from { clip-path:inset(0 0 96% 0); transform:translateY(-16px); } to { clip-path:inset(0 0 0 0); transform:none; } }
  @media (prefers-reduced-motion:reduce) { .bpass.printing { animation:none; } .bpass::after { animation:none; display:none; } }

  /* ============ 발권 시퀀스 로더 ============ */
  .seq-t { font-weight:900; font-size:1.02rem; text-align:center; margin:4px 0 14px; }
  .sq { display:flex; align-items:center; gap:11px; padding:10px 6px; font-size:0.87rem; font-weight:800; color:#94a3b8; transition:color 0.3s; }
  .sq i { flex-shrink:0; width:24px; height:24px; border-radius:50%; border:2.5px solid #e2e8f0; display:flex; align-items:center; justify-content:center; font-style:normal; font-size:0.72rem; transition:all 0.3s; }
  .sq.run { color:#0f172a; }
  .sq.run i { border-color:#F97316; border-top-color:transparent; animation:sp 0.8s linear infinite; }
  .sq.done { color:#15803d; }
  .sq.done i { border-color:transparent; background:linear-gradient(135deg,#22c55e,#4ade80); color:#fff; animation:pop 0.35s cubic-bezier(0.34,1.56,0.64,1); }
  .sq.done i::before { content:'✓'; font-weight:900; }
  @keyframes pop { from { transform:scale(0.4); } to { transform:scale(1); } }
  .spin { width:34px; height:34px; border-radius:50%; border:4px solid #ffe3cf; border-top-color:#F97316; margin:16px auto; animation:sp 0.9s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }

  /* ============ QR 스테이지 ============ */
  .qr-stage { display:flex; justify-content:center; padding:4px 0 2px; }
  .qr-frame2 { position:relative; background:#fff; border-radius:18px; padding:15px; box-shadow:0 12px 32px rgba(15,23,42,0.14); }
  .qr-frame2 .cn { position:absolute; width:22px; height:22px; border:3px solid #F97316; }
  .qr-frame2 .cn.tl { top:6px; left:6px; border-right:none; border-bottom:none; border-radius:8px 0 0 0; }
  .qr-frame2 .cn.tr { top:6px; right:6px; border-left:none; border-bottom:none; border-radius:0 8px 0 0; }
  .qr-frame2 .cn.bl { bottom:6px; left:6px; border-right:none; border-top:none; border-radius:0 0 0 8px; }
  .qr-frame2 .cn.br { bottom:6px; right:6px; border-left:none; border-top:none; border-radius:0 0 8px 0; }
  .qr-frame2 .scan { position:absolute; left:12px; right:12px; top:14px; height:3px; border-radius:3px; background:linear-gradient(90deg,transparent,#F97316 30%,#F59E0B 70%,transparent); box-shadow:0 0 14px rgba(249,115,22,0.55); animation:scan 2.6s ease-in-out infinite; pointer-events:none; }
  @keyframes scan { 0%,100% { transform:translateY(0); opacity:0.9; } 50% { transform:translateY(196px); opacity:0.9; } 52% { opacity:0.2; } }
  .qrsvg { display:block; }
  @media (prefers-reduced-motion:reduce) { .qr-frame2 .scan { display:none; } }

  /* ============ 공용 컴포넌트 (기존 유지) ============ */
  .notice { border-radius:12px; padding:11px 13px; font-size:0.81rem; line-height:1.7; font-weight:600; margin-top:9px; }
  .row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:6.5px 0; font-size:0.85rem; border-bottom:1px solid rgba(15,23,42,0.05); }
  .row:last-of-type { border-bottom:none; }
  .row span { color:#64748b; font-weight:600; flex-shrink:0; }
  .row strong { text-align:right; word-break:break-all; }
  .btn { display:block; width:100%; text-align:center; padding:15px; border:none; border-radius:14px; font-size:0.95rem; font-weight:800; cursor:pointer; text-decoration:none; color:#0f172a; }
  .btn-primary { background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; box-shadow:0 8px 20px rgba(249,115,22,0.3); position:relative; overflow:hidden; }
  .btn-primary:active { transform:scale(0.985); }
  .btn-primary::after { content:''; position:absolute; top:0; left:-80%; width:50%; height:100%; background:linear-gradient(105deg,transparent,rgba(255,255,255,0.35),transparent); transform:skewX(-20deg); animation:sheen 3.8s ease-in-out infinite; }
  @keyframes sheen { 0%,60% { left:-80%; } 80%,100% { left:130%; } }
  .btn-ghost { background:#fff; border:1px solid #e5eaf2; font-size:0.86rem; padding:12px; }
  .center { text-align:center; }
  .muted { color:#7e8ba3; font-size:0.78rem; font-weight:600; }
  .tabs { display:flex; gap:7px; margin:4px 0 14px; }
  .tab { flex:1; padding:11px 4px; border-radius:12px; border:1px solid #e5eaf2; background:#fff; font-size:0.83rem; font-weight:800; color:#64748b; cursor:pointer; transition:all 0.18s; }
  .tab.on { background:#0f172a; color:#fff; border-color:#0f172a; box-shadow:0 6px 16px rgba(15,23,42,0.2); }
  .copyline { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #eef2f7; border-radius:12px; padding:11px 12px; margin-top:8px; }
  .copyline div { min-width:0; flex:1; }
  .copyline .lbl { font-size:0.68rem; font-weight:800; color:#94a3b8; letter-spacing:0.5px; }
  .copyline .val { font-family:ui-monospace,Menlo,monospace; font-size:0.82rem; font-weight:700; word-break:break-all; margin-top:2px; }
  .copybtn { flex-shrink:0; border:none; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-size:0.7rem; font-weight:800; padding:8px 12px; border-radius:18px; cursor:pointer; }
  .step { display:flex; gap:10px; padding:8px 0; font-size:0.84rem; line-height:1.6; color:#334155; }
  .step b { flex-shrink:0; width:21px; height:21px; border-radius:50%; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-size:0.66rem; font-weight:900; display:flex; align-items:center; justify-content:center; }
  .donut-wrap { position:relative; width:172px; height:172px; margin:6px auto; }
  .donut-wrap svg { transform:rotate(-90deg); }
  .donut-bg { fill:none; stroke:#f1f5f9; stroke-width:13; }
  .donut-fg { fill:none; stroke:url(#dg); stroke-width:13; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(0.16,1,0.3,1); }
  .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  .donut-center .big { font-size:1.5rem; font-weight:900; letter-spacing:-0.5px; }
  .donut-center .badge.ok { color:#15803d; background:rgba(34,197,94,0.1); border:none; }
  .donut-center .badge.wait { color:#b45309; background:rgba(245,158,11,0.12); }
  .pillstat { display:flex; gap:9px; margin-top:12px; }
  .pillstat > div { flex:1; background:#f8fafc; border:1px solid #eef2f7; border-radius:13px; padding:11px; text-align:center; }
  .pillstat .l { font-size:0.71rem; font-weight:700; color:#94a3b8; }
  .pillstat .v { font-size:1rem; font-weight:900; margin-top:3px; }
  .daybar { display:flex; align-items:center; gap:9px; padding:7px 0; font-size:0.79rem; font-weight:700; }
  .daybar .d { color:#64748b; flex-shrink:0; width:74px; }
  .daybar .bar { flex:1; height:7px; border-radius:5px; background:#f1f5f9; overflow:hidden; }
  .daybar .bar i { display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,#F97316,#F59E0B); }
  .daybar .mb { flex-shrink:0; color:#F2751F; min-width:56px; text-align:right; }
  /* ============ 🧭 여정 타임라인 (설치확인 + 여행카운터 통합) ============ */
  .jny-h { display:flex; align-items:baseline; gap:8px; font-weight:900; font-size:1rem; margin-bottom:14px; }
  .jstep { display:flex; gap:13px; }
  .jrail { width:30px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; }
  .jrail i { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-style:normal; font-size:0.82rem; font-weight:900; background:#fff; border:2.5px solid #e2e8f0; color:#cbd5e1; flex-shrink:0; }
  .jrail::after { content:''; flex:1; width:2.5px; min-height:16px; background:#e8edf4; border-radius:2px; margin-top:4px; }
  .jstep:last-child .jrail::after { display:none; }
  .jstep.done .jrail i { background:linear-gradient(135deg,#F97316,#F59E0B); border:none; color:#fff; box-shadow:0 4px 10px rgba(249,115,22,0.35); }
  .jstep.done .jrail::after { background:linear-gradient(180deg,#F97316,#FBBF24); }
  .jstep.now .jrail i { border-color:#F97316; color:#F2751F; animation:jpulse 1.8s ease-in-out infinite; }
  @keyframes jpulse { 0%,100% { box-shadow:0 0 0 0 rgba(249,115,22,0.28); } 50% { box-shadow:0 0 0 7px rgba(249,115,22,0); } }
  .jbody { flex:1; min-width:0; padding:3px 0 20px; }
  .jstep:last-child .jbody { padding-bottom:2px; }
  .jbody > b { display:block; font-size:0.92rem; font-weight:900; line-height:1.35; }
  .jstep.now .jbody > b { color:#F2751F; }
  .jbody .jd { font-size:0.78rem; font-weight:600; color:#7e8ba3; margin-top:3px; line-height:1.6; }
  .jstep.done .jbody > .jd { color:#15803d; }
  .jact { margin-top:10px; }
  .jbtns { display:flex; gap:8px; }
  .jbtns .btn { padding:12px 8px; font-size:0.83rem; border-radius:12px; }
  /* 잔여일 게이지 (개통 단계 내부) */
  .gauge-top { display:flex; justify-content:space-between; align-items:baseline; margin-top:8px; }
  .gauge-top .dday { font-size:1.05rem; font-weight:900; }
  .gauge { margin-top:9px; height:9px; border-radius:6px; background:#f1f5f9; overflow:hidden; }
  .gauge i { display:block; height:100%; border-radius:6px; transition:width 0.8s cubic-bezier(0.16,1,0.3,1); }

  /* ============ 🧳 여행 브리핑 캐러셀 ============ */
  .brief { margin:14px 0 4px; }
  .brief-h { display:flex; align-items:baseline; gap:8px; font-weight:900; font-size:1rem; padding:0 2px; }
  .brief-h span { margin-left:auto; font-size:0.68rem; font-weight:800; color:#94a3b8; letter-spacing:0.3px; }
  .brief-scroll { display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; padding:12px 16px 16px; margin:0 -16px; scrollbar-width:none; -webkit-overflow-scrolling:touch; }
  .brief-scroll::-webkit-scrollbar { display:none; }
  .bcard { scroll-snap-align:start; flex:0 0 208px; background:#fff; border:1px solid #eef2f7; border-radius:16px; padding:14px; box-shadow:0 6px 18px rgba(15,23,42,0.05); display:flex; flex-direction:column; gap:7px; }
  .bcard .btag { align-self:flex-start; font-size:0.6rem; font-weight:900; letter-spacing:1.4px; padding:4px 9px; border-radius:8px; }
  .bcard.prep .btag { color:#15803d; background:rgba(34,197,94,0.1); }
  .bcard.warn .btag { color:#b45309; background:rgba(245,158,11,0.14); }
  .bcard.entry .btag { color:#1d4ed8; background:rgba(59,130,246,0.1); }
  .bcard.common .btag { color:#475569; background:#eef2f7; }
  .bcard .bic { font-size:1.6rem; line-height:1; }
  .bcard b { font-size:0.86rem; font-weight:900; line-height:1.45; }
  .bcard p { font-size:0.76rem; font-weight:700; line-height:1.6; color:#64748b; margin-top:auto; }
  .bcard.power { background:linear-gradient(135deg,#101B3E,#1B2C55); border:none; box-shadow:0 10px 26px rgba(11,20,48,0.3); }
  .bcard.power .btag { color:#FBBF24; background:rgba(251,191,36,0.14); }
  .bcard.power b { color:#fff; }
  .bcard.power p { color:#8FA3D9; }

  /* ============ 상시 노출 경고 밴드 ============ */
  .warnband { border-radius:16px; overflow:hidden; margin-top:12px; border:1.5px solid rgba(239,68,68,0.28); background:#fff; }
  .warnband .w { display:flex; gap:11px; padding:13px 14px; font-size:0.81rem; font-weight:700; line-height:1.65; align-items:flex-start; }
  .warnband .w .wi { flex-shrink:0; font-size:1.05rem; margin-top:1px; }
  .warnband .w.red { background:rgba(239,68,68,0.06); color:#b91c1c; }
  .warnband .w.amber { background:rgba(245,158,11,0.07); color:#92400e; border-top:1px dashed rgba(239,68,68,0.2); }

  /* ============ 아이콘 행 브리핑 (발급 전) ============ */
  .irow { display:flex; gap:12px; padding:10px 0; align-items:flex-start; }
  .irow + .irow { border-top:1px dashed #eef2f7; }
  .irow .ic { flex-shrink:0; width:36px; height:36px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:1.05rem; background:#f8fafc; border:1px solid #eef2f7; }
  .irow .tx { font-size:0.83rem; font-weight:700; line-height:1.65; color:#334155; min-width:0; }

  /* ============ 🕐 헤더 메타 (현지시간 · 시차 · D-Day) ============ */
  .sky-meta { display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-top:15px; font-size:0.73rem; font-weight:800; color:#B9C7EA; }
  .sky-meta .dot { color:#3D4E80; }
  .sky-meta b { color:#fff; font-variant-numeric:tabular-nums; }
  .sky-meta .dd { border:1px solid rgba(251,191,36,0.45); background:rgba(251,191,36,0.12); color:#FBBF24; font-family:inherit; font-weight:900; font-size:0.7rem; padding:5px 11px; border-radius:16px; cursor:pointer; }
  .sky-meta .dd.hot { background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; border-color:transparent; box-shadow:0 4px 12px rgba(249,115,22,0.4); }

  /* ============ 🔍 전체화면 QR ============ */
  .qrfull { position:fixed; inset:0; z-index:99990; background:#fff; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:24px; animation:qf 0.22s ease both; }
  @keyframes qf { from { opacity:0; transform:scale(1.03); } to { opacity:1; transform:none; } }
  .qrfull svg { width:min(86vw,64vh,480px); height:auto; }
  .qrfull .qf-tip { font-size:0.85rem; font-weight:800; color:#334155; text-align:center; line-height:1.6; }
  .qrfull .qf-x { position:absolute; top:calc(14px + env(safe-area-inset-top,0px)); right:16px; width:44px; height:44px; border-radius:50%; border:1px solid #e5eaf2; background:#f8fafc; font-size:1.05rem; font-weight:900; color:#334155; cursor:pointer; }
  .qr-tap { cursor:zoom-in; }

  /* ============ 🆘 비상 연락 카드 ============ */
  .sos { background:linear-gradient(135deg,#1C1017,#2B1520); border:1px solid rgba(239,68,68,0.35); border-radius:18px; padding:16px; margin-bottom:12px; box-shadow:0 12px 30px rgba(43,21,32,0.35); }
  .sos-h { display:flex; align-items:baseline; gap:8px; color:#fff; font-weight:900; font-size:0.98rem; }
  .sos-h span { margin-left:auto; font-size:0.66rem; font-weight:800; color:#F8B4B4; letter-spacing:0.5px; }
  .sos-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:12px; }
  .sos-grid a { display:flex; flex-direction:column; gap:3px; padding:12px 13px; border-radius:13px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); text-decoration:none; }
  .sos-grid a i { font-style:normal; font-size:0.64rem; font-weight:900; letter-spacing:1px; color:#F8B4B4; }
  .sos-grid a b { color:#fff; font-size:0.95rem; font-weight:900; font-variant-numeric:tabular-nums; }
  .sos-grid a.kko { background:rgba(254,229,0,0.1); border-color:rgba(254,229,0,0.35); }
  .sos-grid a.kko i { color:#FEE500; }

  /* ============ 🛬 도착 30초 체크리스트 + 개통버튼 활성 연출 ============ */
  .arrchk .chk { margin-top:7px; font-size:0.81rem; }
  .btn.ready { animation:readyPulse 1.5s ease-in-out infinite; }
  @keyframes readyPulse { 0%,100% { box-shadow:0 8px 20px rgba(249,115,22,0.3); } 50% { box-shadow:0 8px 30px rgba(249,115,22,0.65), 0 0 0 5px rgba(249,115,22,0.12); } }
  @media (prefers-reduced-motion:reduce) { .btn.ready, .qrfull { animation:none; } }
  .agree-box { display:flex; align-items:flex-start; gap:10px; padding:12px 13px; border:1.5px solid rgba(242,117,31,0.35); background:rgba(242,117,31,0.05); border-radius:13px; margin-top:9px; cursor:pointer; font-size:0.84rem; font-weight:700; line-height:1.6; transition:all 0.2s; }
  .agree-box input { width:20px; height:20px; accent-color:#F2751F; flex-shrink:0; margin-top:1px; }
  .agree-box.ok { border-color:#22c55e; background:rgba(34,197,94,0.06); }
  .shake { animation:shk 0.4s ease; border-color:#ef4444 !important; }
  @keyframes shk { 25% { transform:translateX(-7px); } 50% { transform:translateX(7px); } 75% { transform:translateX(-4px); } }
  .kakao-float { position:fixed; right:16px; bottom:calc(18px + env(safe-area-inset-bottom,0px)); z-index:50; display:flex; align-items:center; gap:7px; background:#FEE500; color:#191919; font-weight:800; font-size:0.78rem; padding:12px 16px; border-radius:26px; text-decoration:none; box-shadow:0 10px 26px rgba(0,0,0,0.18); }
  .flow { display:flex; align-items:flex-start; margin:2px 2px 16px; }
  .flow .fs { display:flex; flex-direction:column; align-items:center; gap:5px; flex-shrink:0; }
  .flow .dot { width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:900; background:#fff; border:2px solid #e2e8f0; color:#cbd5e1; }
  .flow .fs.done .dot { background:linear-gradient(135deg,#F97316,#F59E0B); border:none; color:#fff; box-shadow:0 4px 10px rgba(249,115,22,0.35); }
  .flow .fs.now .dot { border-color:#F97316; color:#F97316; box-shadow:0 0 0 4px rgba(249,115,22,0.14); }
  .flow .lb { font-size:0.64rem; font-weight:800; color:#94a3b8; white-space:nowrap; }
  .flow .fs.done .lb, .flow .fs.now .lb { color:#F2751F; }
  .flow .ln { flex:1; height:2.5px; background:#e2e8f0; margin:12px 4px 0; border-radius:2px; }
  .flow .ln.done { background:linear-gradient(90deg,#F97316,#F59E0B); }
  .romi { display:flex; align-items:center; gap:11px; margin-bottom:12px; animation:rise 0.5s cubic-bezier(0.16,1,0.3,1) both; }
  .romi img { width:52px; height:52px; object-fit:contain; }
  .romi .bub { background:#fff; border:1px solid #ffe0c7; border-radius:14px 14px 14px 4px; padding:10px 13px; font-size:0.84rem; font-weight:700; color:#334155; box-shadow:0 6px 16px rgba(249,115,22,0.1); line-height:1.5; }
  .chk { display:flex; align-items:flex-start; gap:10px; padding:11px 12px; border:1px solid #eef2f7; border-radius:13px; margin-top:8px; cursor:pointer; font-size:0.79rem; font-weight:700; line-height:1.55; background:#fff; transition:all 0.2s; }
  .chk input { width:19px; height:19px; accent-color:#22c55e; flex-shrink:0; margin-top:1px; }
  .chk.on { border-color:rgba(34,197,94,0.4); background:rgba(34,197,94,0.05); }
  .chk.on span { color:#15803d; }
  .cf { position:fixed; top:-16px; z-index:9999; pointer-events:none; animation:cfall linear both; }
  .cf.r { border-radius:2px; }
  .cf.t { font-size:15px; line-height:1; }
  @keyframes cfall { to { transform:translateY(105vh) rotate(640deg); opacity:0.55; } }
  @media (prefers-reduced-motion:reduce) { .card,.spin,.shake,.cf,.romi { animation:none !important; } .donut-fg { transition:none; } .btn-primary::after { animation:none; display:none; } }

var clockTimer = null;
function tzOffsetMin(tz, base){
  // 특정 타임존의 현재 벽시계를 파싱해 분 단위 오프셋 비교 (Intl 기반, 오프라인 동작)
  var d = new Date(base.toLocaleString('en-US', { timeZone: tz }));
  return Math.round((d - base) / 60000);
}
function timeDiffText(tz){
  try {
    var now = new Date();
    var diff = tzOffsetMin(tz, now) - tzOffsetMin('Asia/Seoul', now);
    if (!diff) return '한국과 시차 없음';
    var h = Math.abs(diff) / 60;
    var hs = (h % 1 ? h.toFixed(1) : String(h)) + '시간';
    return diff > 0 ? '한국보다 ' + hs + ' 빨라요' : '한국보다 ' + hs + ' 느려요';
  } catch(e){ return ''; }
}

  var today = new Date(); today.setHours(0,0,0,0);
  var d = Math.round((new Date(dep + 'T00:00:00') - today) / 86400000);
  if (d > 0) return '✈️ 출국 D-' + d;
  if (d === 0) return '✈️ 오늘 출국!';

    return '<svg class="qrsvg" width="'+px+'" height="'+px+'" viewBox="0 0 '+S+' '+S+'" shape-rendering="crispEdges" role="img" aria-label="eSIM 설치 QR"><rect width="'+S+'" height="'+S+'" fill="#fff"/><path d="'+d+'" fill="#0f172a"/></svg>';
  }catch(e){ return null; }
}
function saveQrLocal(lpa){
  try{
    var q = qrcode(0,'M'); q.addData(String(lpa)); q.make();
    var n = q.getModuleCount(), Q = 4, cell = 20, S = (n+Q*2)*cell;
    var cv = document.createElement('canvas'); cv.width = cv.height = S;
    var g = cv.getContext('2d');
    g.fillStyle = '#fff'; g.fillRect(0,0,S,S);
    g.fillStyle = '#0f172a';
    for (var r=0;r<n;r++) for (var c=0;c<n;c++) if (q.isDark(r,c)) g.fillRect((c+Q)*cell,(r+Q)*cell,cell,cell);
    cv.toBlob(function(b){
      var a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'JDISIM-eSIM-QR.png'; a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); }, 4000);
      toast('🖼️ QR 이미지가 저장됐어요');
    }, 'image/png');
  }catch(e){ toast('저장에 실패했어요 — QR을 스크린샷으로 남겨주세요'); }
}

// ===== 🧳 여행 브리핑 캐러셀 (드롭다운 대체 — 스냅 카드) =====
function splitEmoji(s){
  // 앞머리 이모지(있으면)와 본문 분리 — 유니코드 속성 정규식 없이 서로게이트로 안전 처리
  s = String(s || '');
  var i = 0;
  while (i < s.length) {
    var cp = s.codePointAt(i);
    if (cp >= 0x1F000 || (cp >= 0x2600 && cp <= 0x27BF) || cp === 0xFE0F || cp === 0x200D) { i += (cp > 0xFFFF ? 2 : 1); }
    else break;
  }
  var em = s.slice(0, i).trim();
  return { emoji: em, text: s.slice(i).trim() };
}
function briefCard(cls, tag, icon, text){
  var sp = splitEmoji(text);
  var ic = sp.emoji || icon;
  var parts = sp.text.split(' — ');
  var title = parts.shift();
  var desc = parts.join(' — ');
  return '<div class="bcard '+cls+'"><span class="btag">'+tag+'</span><span class="bic">'+ic+'</span><b>'+esc(title)+'</b>'+(desc?'<p>'+esc(desc)+'</p>':'')+'</div>';
}
function buildBriefHTML(country) {

    (t.items||[]).forEach(function(x){ cards += briefCard('prep','준비물','🧳',x); });

}

// 진행 스트립 (0=결제,1=발급,2=설치,3=개통)
function flowStrip(step){
  var labels=['결제 완료','eSIM 발급','기기에 설치','현지 개통'];
  var out='<div class="flow">';
  for(var i=0;i<4;i++){
    var cls = i<step?'done':(i===step?'now':'');
    if(i) out += '<div class="ln '+(i<step?'done':'')+'"></div>';
    out += '<div class="fs '+cls+'"><div class="dot">'+(i<step?'✓':(i+1))+'</div><div class="lb">'+labels[i]+'</div></div>';
  }
  return out+'</div>';
}

// ===== 🛫 여행 카운터 (자가신고 기반 — 서버·도매처 API 불필요) =====
function planDays(){
  var m = String((order && order.productName) || '').match(/(\d+)\s*일/);
  return m ? parseInt(m[1], 10) : 0;
}
function tripState(){
  try { return JSON.parse(localStorage.getItem('jd_trip_' + ((order && order.orderCode) || 'x')) || '{}'); } catch (e) { return {}; }
}
function saveTrip(st){
  try { localStorage.setItem('jd_trip_' + ((order && order.orderCode) || 'x'), JSON.stringify(st)); } catch (e) {}
}
function tripStep(){
  var st = tripState();
  if (st.activatedAt) return 3;   // 현지 개통
  if (st.installedAt) return 2;   // 설치 완료 (다음: 개통)
  return 2;                        // 발급 완료 상태의 기본
}
function markInstalled(){
  var st = tripState(); st.installedAt = st.installedAt || new Date().toISOString(); saveTrip(st);
  renderJourney(); confetti(); buzz([16,50,16]);
}
function markActivated(){
  var st = tripState();
  st.installedAt = st.installedAt || new Date().toISOString();
  st.activatedAt = st.activatedAt || new Date().toISOString();
  saveTrip(st); renderJourney(); confetti(); buzz([16,50,16]);
}
// ===== 🧭 내 여정 타임라인 (진행상태 + 설치확인 + 여행카운터 통합) =====
function journeyHTML(){ return '<div class="card" id="jny"></div>'; }
function jstep(state, num, title, desc, act){
  var mark = state === 'done' ? '✓' : num;
  return '<div class="jstep ' + state + '"><div class="jrail"><i>' + mark + '</i></div>' +
    '<div class="jbody"><b>' + title + '</b>' + (desc ? '<div class="jd">' + desc + '</div>' : '') + (act ? '<div class="jact">' + act + '</div>' : '') + '</div></div>';
}
function fmtShort(iso){ try { var d = new Date(iso); return (d.getMonth()+1) + '/' + d.getDate() + ' ' + ('0'+d.getHours()).slice(-2) + ':' + ('0'+d.getMinutes()).slice(-2); } catch(e){ return ''; } }
function renderJourney(){
  var box = $('jny'); if (!box) return;
  var st = tripState(), days = planDays();
  var html = '<div class="jny-h">🧭 내 여정<span class="muted">발급부터 개통까지 한눈에</span></div>';
  html += jstep('done', 1, '결제 완료', '');
  html += jstep('done', 2, 'eSIM 발급 완료', 'QR 준비 끝 — 언제든 이 링크에서 다시 볼 수 있어요');
  // ── 설치 단계
  if (st.installedAt) {
    html += jstep('done', 3, '기기에 설치 완료', fmtShort(st.installedAt) + ' 확인');
  } else {
    html += jstep('now', 3, '기기에 설치',
      '위의 원클릭 · QR · 수동입력 중 하나로 설치한 뒤 확인해 보세요',
      '<div class="jbtns"><button class="btn btn-ghost" onclick="checkInstalled(\'' + esc(order && order.iccid || '') + '\')">🔎 설치 자동 확인</button>' +
      '<button class="btn btn-ghost" onclick="markInstalled()">✅ 설치 완료로 표시</button></div><div id="jsInstRes"></div>');
  }
  // ── 개통 단계
  if (st.activatedAt) {
    var used = Math.floor((Date.now() - new Date(st.activatedAt).getTime()) / 86400000) + 1; // 개통일 = 1일차
    var left = days ? Math.max(0, days - used) : 0;
    var pct = days ? Math.min(100, Math.round(used / days * 100)) : 0;
    var barColor = !days ? '#22c55e' : (left <= 1 ? '#ef4444' : left <= 2 ? '#f59e0b' : '#22c55e');
    var gauge =
      '<div class="gauge-top"><span class="muted">' + new Date(st.activatedAt).toLocaleDateString('ko-KR') + ' 개통</span>' +
      (days ? '<span class="dday" style="color:' + barColor + ';">' + (left > 0 ? '남은 ' + left + '일' : '오늘 만료') + '</span>' : '<span class="dday" style="color:#22c55e;">사용 중</span>') + '</div>' +
      (days ? '<div class="gauge"><i style="width:' + pct + '%;background:' + barColor + ';"></i></div>' : '') +
      '<div class="jd" style="margin-top:8px;">💡 일 용량 상품은 매일 자정(현지 기준)에 고속 데이터가 새로 채워져요</div>' +
      (days && left <= 2 ? '<a class="btn btn-primary" style="margin-top:11px;" href="https://jdisim.co.kr/mobile.html" target="_blank" rel="noopener">🔋 여행이 더 길어졌나요? 연장 eSIM 3초 주문 →</a>' : '');
    html += jstep('done', 4, '현지 개통 — 여행 ' + used + '일차 🛬', '', gauge);
  } else if (st.installedAt) {
    var isI = /iPhone|iPad|iPod/.test(navigator.userAgent);
    var steps = isI
      ? ['설정 → 셀룰러 → 새 eSIM 회선 <strong>켜기</strong>', '그 회선의 <strong>데이터 로밍 ON</strong>', '셀룰러 데이터를 새 회선으로 선택 — 상단에 신호가 뜨면 성공!']
      : ['설정 → 연결 → SIM 관리자 → 새 eSIM <strong>켜기</strong>', '모바일 데이터를 새 eSIM으로 선택', '<strong>데이터 로밍 ON</strong> — 상단에 신호가 뜨면 성공!'];
    var chks = '<div class="arrchk" id="arrChk">' + steps.map(function(s){
      return '<label class="chk"><input type="checkbox" onchange="arrTick(this)"><span>' + s + '</span></label>';
    }).join('') + '</div>';
    html += jstep('now', 4, '현지 개통 — 도착 30초 세팅',
      '현지 도착 후 아래 순서대로 켜기만 하면 끝이에요',
      chks + '<button class="btn btn-primary" id="actBtn" style="margin-top:11px;" onclick="markActivated()">🛬 현지 도착 · 개통했어요!</button>');
  } else {
    html += jstep('todo', 4, '현지 개통', '현지 도착 → 데이터 로밍 켜기 — 그 순간부터 사용일이 시작돼요');
  }
  box.innerHTML = html;
}
function arrTick(inp){
  var lb = inp.closest('label'); if (lb) lb.classList.toggle('on', inp.checked);
  var wrap = $('arrChk'), btn = $('actBtn');
  if (!wrap || !btn) return;
  var all = wrap.querySelectorAll('input'), on = wrap.querySelectorAll('input:checked');
  btn.classList.toggle('ready', all.length && all.length === on.length);
  if (all.length === on.length) buzz(14);
}

function seqMark(i){
  var el = $('sq'+i); if (!el) return;
  el.classList.remove('run'); el.classList.add('done');
  var nx = $('sq'+(i+1)); if (nx && !nx.classList.contains('done')) nx.classList.add('run');
}
function seqFinish(then){
  seqTimers.forEach(clearTimeout);
  seqMark(0); seqMark(1);
  setTimeout(function(){ seqMark(2); }, 260);
  setTimeout(then, 780);
}

function doIssue(){
  seqUI();
  if (LOCAL){
    setTimeout(function(){
      var found = findLocalOrder(LOCAL);
      var lpa = 'LPA:1$rsp.test.jdisim$' + (order.iccid || String(Date.now()));
      if (found) {
        try {
          var arr = JSON.parse(localStorage.getItem(found.store) || '[]');
          if (arr[found.idx] && arr[found.idx].items && arr[found.idx].items[0]) {
            arr[found.idx].items[0].lpa = lpa;
            localStorage.setItem(found.store, JSON.stringify(arr));
          }
        } catch (e) {}
      }
      order.status = 'ISSUED';
      seqFinish(function(){
        renderIssued(lpa, false);
        document.getElementById('app').insertAdjacentHTML('afterbegin', localBanner());
      });
    }, 1400);
    return;
  }
  if (DEMO){ setTimeout(function(){ order.status='ISSUED'; seqFinish(function(){ renderIssued('LPA:1$rsp.billionconnect.com$F8B7C1B0B68F4AB889460F568F1F13D7', false); }); },1400); return; }
  fetch(CONFIG.ISSUE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,agreedNoRefund:true,agreedDevice:true,agreedAt:new Date().toISOString()})})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){ if(d.lpa) seqFinish(function(){ renderIssued(d.lpa,false); }); else if(d.status==='PENDING') pollIssue(0); else throw 0; })
    .catch(function(){ renderError('발급 중 문제가 생겼어요','결제는 안전하게 보존되어 있어요. 잠시 후 다시 시도하시거나 카톡 상담을 눌러주세요.'); });
}

function pollIssue(n){
  if(n>40) return renderError('발급이 지연되고 있어요','완료되면 카톡으로 알려드릴게요 — 결제는 안전하게 보존됩니다.');
  setTimeout(function(){
    fetch(CONFIG.ORDER_API+'?token='+encodeURIComponent(token)).then(function(r){return r.json();})
      .then(function(d){ if(d.status==='ISSUED'&&d.lpa) seqFinish(function(){ renderIssued(d.lpa,false); }); else pollIssue(n+1); })
      .catch(function(){ pollIssue(n+1); });
  },3000);
}

// ---------------- 발급 완료: 3탭 설치 + 설치확인 + 사용량 ----------------

function instOk(msg){
  // 설치 확인됨 → 여정 타임라인의 설치 단계를 자동 완료 (세리머니 포함)
  toast(msg || '✅ 설치가 확인됐어요!');
  markInstalled();
}
function instMsg(html){ var box = $('jsInstRes'); if (box) box.innerHTML = html; }
function checkInstalled(iccid){
  instMsg('<div class="muted" style="padding:9px 2px 0;">⏳ 확인 중...</div>');
  if (DEMO){ setTimeout(function(){ instOk('✅ 기기에 설치가 확인됐어요!'); },1200); return; }
  if (CARE && window.CARE_API){
    var q = 'iccid='+encodeURIComponent(iccid)+'&action=install&store='+encodeURIComponent((order&&order.storeId)||'');
    fetch(window.CARE_API+'?'+q).then(function(r){return r.json();}).then(function(d){
      if (d && d.isInstalled) instOk('✅ ' + (d.message || '기기에 설치가 확인됐어요!'));
      else instMsg('<div class="notice" style="background:#f8fafc;border:1px solid #e5eaf2;color:#334155;">아직 설치 전이에요 — 위의 원클릭/QR/수동입력으로 설치해 주세요</div>');
    }).catch(function(){ instMsg('<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;">확인에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'); });
    return;
  }
  if (!CONFIG.STATUS_API){ instMsg('<div class="notice" style="background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.2);color:#9a5b16;">🛠️ 자동 확인은 곧 오픈돼요 — 설정 → 셀룰러에 새 회선이 보이면 설치 성공! 옆의 <strong>설치 완료로 표시</strong>를 눌러주세요</div>'); return; }
  fetch(CONFIG.STATUS_API+'?iccid='+encodeURIComponent(iccid)).then(function(r){return r.json();})
    .then(function(d){ if (d.installed) instOk(); else instMsg('<div class="notice" style="background:#f8fafc;border:1px solid #e5eaf2;color:#334155;">아직 설치 전이에요 — 위의 원클릭/QR/수동입력으로 설치해 주세요</div>'); })
    .catch(function(){ instMsg('<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;">확인에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'); });
}

function loadUsage(){
  var box=$('usageBody');
  box.innerHTML='<div class="muted" style="padding:14px 0;">⏳ 조회 중...</div>';
  if (DEMO){ return renderUsage({used_mb:126,total_mb:2048,status:'active',daily:[{date:'2026-07-09',mb:126}]}); }
  if (CARE && window.CARE_API){
    fetch(window.CARE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')+'&action=usage').then(function(r){return r.json();}).then(function(d){
      var lst = (d && d.usageList) || [];
      if (!lst.length){
        box.innerHTML='<div class="notice" style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);color:#1d4ed8;text-align:left;">ℹ️ 아직 사용량 기록이 없어요.<br>무제한 요금제이거나 현지에서 아직 개통 전일 수 있어요. 개통 후 다시 눌러보세요!<br><span style="color:#64748b;">정확한 사용량은 설정 → 셀룰러 → 해당 회선에서도 볼 수 있어요.</span></div>';
        return;
      }
      // usageList가 채워지면 표준 포맷으로 변환해 도넛 렌더
      var used=0,total=0,daily=[];
      lst.forEach(function(r){ var mb=Number(r.used||r.usedMb||r.dataUsed||0); used+=mb; if(r.date||r.useDate)daily.push({date:r.date||r.useDate,mb:mb}); if(r.total||r.totalMb)total=Number(r.total||r.totalMb); });
      renderUsage({used_mb:used,total_mb:total,status:'active',daily:daily});
    }).catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;text-align:left;">조회에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
    return;
  }
  if (!CONFIG.USAGE_API){ box.innerHTML='<div class="notice" style="background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.2);color:#9a5b16;text-align:left;">🛠️ 실시간 사용량 조회는 곧 오픈돼요!<br>지금은 설정 → 셀룰러 → 해당 회선에서 확인할 수 있어요</div>'; return; }
  fetch(CONFIG.USAGE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')).then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(renderUsage)
    .catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;text-align:left;">조회에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
}

function renderUsage(d){
  var box=$('usageBody');
  var used=Number(d.used_mb)||0, total=Number(d.total_mb)||0;
  var remain=Math.max(0,total-used);
  var pct= total? Math.min(100, used/total*100) : 0;
  var C=2*Math.PI*72; // r=72
  var maxDay = Math.max.apply(null, (d.daily||[{mb:1}]).map(function(x){return x.mb||1;}));
  box.style.textAlign='inherit';
  box.innerHTML =
    '<div class="donut-wrap"><svg width="172" height="172" viewBox="0 0 172 172">' +
    '<defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F97316"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>' +
    '<circle class="donut-bg" cx="86" cy="86" r="72"></circle>' +
    '<circle class="donut-fg" id="dfg" cx="86" cy="86" r="72" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle></svg>' +
    '<div class="donut-center"><span class="muted">현재 남은 데이터</span><span class="big">'+(total? gb(remain)+' GB' : '무제한 ♾️')+'</span>' +
    '<span class="badge '+(d.status==='active'?'ok':'wait')+'">'+(d.status==='active'?'● 사용 중':d.status==='expired'?'만료됨':'개통 대기')+'</span></div></div>' +
    (total? '<div class="pillstat"><div><div class="l">사용한 데이터</div><div class="v">'+gb(used)+' GB</div></div><div><div class="l">남은 데이터</div><div class="v" style="color:#F2751F;">'+gb(remain)+' GB</div></div></div>' : '') +
    ((d.daily&&d.daily.length)? '<div style="font-weight:800;font-size:0.8rem;margin:14px 0 4px;">일별 사용 내역 <span class="muted">총 '+d.daily.length+'일</span></div>' +
      d.daily.map(function(x){ return '<div class="daybar"><span class="d">'+esc(x.date)+'</span><span class="bar"><i style="width:'+Math.max(4,Math.round((x.mb||0)/maxDay*100))+'%"></i></span><span class="mb">'+(x.mb>=1024? gb(x.mb)+'GB' : Math.round(x.mb)+'MB')+'</span></div>'; }).join('') : '') +
    '<button class="btn btn-ghost" style="margin-top:12px;" onclick="loadUsage()">🔄 새로고침</button>';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ var el=$('dfg'); if(el) el.style.strokeDashoffset = String(C*(1-pct/100)); }); });
}

function renderError(title,msg){
  h('<div class="card center" style="margin-top:2px;"><div style="font-size:2rem;">🦊</div><div style="font-weight:800;margin-top:6px;">'+esc(title)+'</div><div class="muted" style="margin-top:6px;line-height:1.7;">'+esc(msg)+'</div><div style="height:14px;"></div><a class="btn btn-primary" href="https://pf.kakao.com/_GSixcn/chat" target="_blank" rel="noopener">💬 카톡 상담 바로 연결</a></div>');
}

loadOrder();
