<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F97316">
<title>eSIM 발급 — JDISIM</title>
<meta name="robots" content="noindex">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Pretendard','Apple SD Gothic Neo','Noto Sans KR',sans-serif; background:linear-gradient(180deg,#fdfefe,#f4f6fa); min-height:100dvh; color:#0f172a; -webkit-font-smoothing:antialiased; }
  ::selection { background:rgba(249,115,22,0.22); }
  .wrap { max-width:440px; margin:0 auto; padding:16px 16px calc(30px + env(safe-area-inset-bottom,0px)); }
  .brand { display:flex; align-items:center; gap:9px; padding:8px 2px 16px; }
  .brand-badge { width:34px; height:34px; border-radius:10px; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-weight:900; font-size:1.05rem; display:flex; align-items:center; justify-content:center; box-shadow:0 5px 14px rgba(249,115,22,0.3); }
  .brand strong { font-size:1.02rem; letter-spacing:0.4px; }
  .card { background:#fff; border:1px solid #eef2f7; border-radius:18px; padding:16px; box-shadow:0 8px 24px rgba(15,23,42,0.05); margin-bottom:12px; animation:rise 0.55s cubic-bezier(0.16,1,0.3,1) both; }
  .card:nth-of-type(2){animation-delay:0.07s}.card:nth-of-type(3){animation-delay:0.14s}.card:nth-of-type(4){animation-delay:0.21s}
  @keyframes rise { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:none; } }
  .ticket { background:linear-gradient(180deg,#fff,#fffaf5); border:1px solid rgba(242,117,31,0.3); position:relative; }
  .badge { font-size:0.62rem; font-weight:900; padding:4px 9px; border-radius:11px; }
  .badge.ok { color:#15803d; background:rgba(34,197,94,0.1); }
  .badge.wait { color:#b45309; background:rgba(245,158,11,0.12); }
  .row { display:flex; justify-content:space-between; align-items:baseline; gap:10px; padding:6.5px 0; font-size:0.79rem; border-bottom:1px solid rgba(15,23,42,0.05); }
  .row:last-of-type { border-bottom:none; }
  .row span { color:#64748b; font-weight:600; flex-shrink:0; }
  .row strong { text-align:right; word-break:break-all; }
  .barcode { height:15px; margin-top:10px; border-radius:2px; opacity:0.82; background:repeating-linear-gradient(90deg,#0f172a 0 1.5px,transparent 1.5px 3.5px,#0f172a 3.5px 6px,transparent 6px 7px,#0f172a 7px 8px,transparent 8px 11px); }
  .btn { display:block; width:100%; text-align:center; padding:15px; border:none; border-radius:14px; font-size:0.9rem; font-weight:800; cursor:pointer; text-decoration:none; color:#0f172a; }
  .btn-primary { background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; box-shadow:0 8px 20px rgba(249,115,22,0.3); }
  .btn-ghost { background:#fff; border:1px solid #e5eaf2; font-size:0.8rem; padding:12px; }
  .notice { border-radius:12px; padding:11px 13px; font-size:0.75rem; font-weight:700; line-height:1.65; margin-top:9px; }
  .agree-box { display:flex; align-items:flex-start; gap:10px; padding:12px 13px; border:1.5px solid rgba(242,117,31,0.35); background:rgba(242,117,31,0.05); border-radius:13px; margin-top:9px; cursor:pointer; font-size:0.78rem; font-weight:700; line-height:1.55; transition:all 0.2s; }
  .agree-box input { width:20px; height:20px; accent-color:#F2751F; flex-shrink:0; margin-top:1px; }
  .agree-box.ok { border-color:#22c55e; background:rgba(34,197,94,0.06); }
  .center { text-align:center; }
  .muted { color:#94a3b8; font-size:0.72rem; font-weight:600; }
  .spin { width:34px; height:34px; border-radius:50%; border:4px solid #ffe3cf; border-top-color:#F97316; margin:16px auto; animation:sp 0.9s linear infinite; }
  @keyframes sp { to { transform:rotate(360deg); } }
  /* 설치 3탭 */
  .tabs { display:flex; gap:7px; margin:4px 0 14px; }
  .tab { flex:1; padding:11px 4px; border-radius:12px; border:1px solid #e5eaf2; background:#fff; font-size:0.78rem; font-weight:800; color:#64748b; cursor:pointer; transition:all 0.18s; }
  .tab.on { background:#0f172a; color:#fff; border-color:#0f172a; box-shadow:0 6px 16px rgba(15,23,42,0.2); }
  .copyline { display:flex; align-items:center; gap:8px; background:#f8fafc; border:1px solid #eef2f7; border-radius:12px; padding:11px 12px; margin-top:8px; }
  .copyline div { min-width:0; flex:1; }
  .copyline .lbl { font-size:0.64rem; font-weight:800; color:#94a3b8; letter-spacing:0.5px; }
  .copyline .val { font-family:ui-monospace,Menlo,monospace; font-size:0.76rem; font-weight:700; word-break:break-all; margin-top:2px; }
  .copybtn { flex-shrink:0; border:none; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-size:0.7rem; font-weight:800; padding:8px 12px; border-radius:18px; cursor:pointer; }
  .qr-frame { background:#fff; border-radius:16px; padding:13px; display:inline-block; box-shadow:0 10px 26px rgba(15,23,42,0.1); }
  .step { display:flex; gap:10px; padding:8px 0; font-size:0.78rem; line-height:1.6; color:#334155; }
  .step b { flex-shrink:0; width:21px; height:21px; border-radius:50%; background:linear-gradient(135deg,#F97316,#F59E0B); color:#fff; font-size:0.66rem; font-weight:900; display:flex; align-items:center; justify-content:center; }
  /* 사용량 도넛 */
  .donut-wrap { position:relative; width:172px; height:172px; margin:6px auto; }
  .donut-wrap svg { transform:rotate(-90deg); }
  .donut-bg { fill:none; stroke:#f1f5f9; stroke-width:13; }
  .donut-fg { fill:none; stroke:url(#dg); stroke-width:13; stroke-linecap:round; transition:stroke-dashoffset 1.1s cubic-bezier(0.16,1,0.3,1); }
  .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; }
  .donut-center .big { font-size:1.5rem; font-weight:900; letter-spacing:-0.5px; }
  .pillstat { display:flex; gap:9px; margin-top:12px; }
  .pillstat > div { flex:1; background:#f8fafc; border:1px solid #eef2f7; border-radius:13px; padding:11px; text-align:center; }
  .pillstat .l { font-size:0.66rem; font-weight:700; color:#94a3b8; }
  .pillstat .v { font-size:0.92rem; font-weight:900; margin-top:3px; }
  .daybar { display:flex; align-items:center; gap:9px; padding:7px 0; font-size:0.74rem; font-weight:700; }
  .daybar .d { color:#64748b; flex-shrink:0; width:74px; }
  .daybar .bar { flex:1; height:7px; border-radius:5px; background:#f1f5f9; overflow:hidden; }
  .daybar .bar i { display:block; height:100%; border-radius:5px; background:linear-gradient(90deg,#F97316,#F59E0B); }
  .daybar .mb { flex-shrink:0; color:#F2751F; min-width:56px; text-align:right; }
  details.g { margin-top:9px; background:#fff; border:1px solid #eef2f7; border-radius:13px; overflow:hidden; }
  details.g summary { list-style:none; padding:12px 14px; font-size:0.79rem; font-weight:800; cursor:pointer; display:flex; }
  details.g summary::after { content:'▾'; margin-left:auto; color:#94a3b8; }
  .shake { animation:shk 0.4s ease; border-color:#ef4444 !important; }
  @keyframes shk { 25% { transform:translateX(-7px); } 50% { transform:translateX(7px); } 75% { transform:translateX(-4px); } }
  .kakao-float { position:fixed; right:16px; bottom:calc(18px + env(safe-area-inset-bottom,0px)); z-index:50; display:flex; align-items:center; gap:7px; background:#FEE500; color:#191919; font-weight:800; font-size:0.78rem; padding:12px 16px; border-radius:26px; text-decoration:none; box-shadow:0 10px 26px rgba(0,0,0,0.18); }
  @media (prefers-reduced-motion:reduce) { .card,.spin,.shake { animation:none !important; } .donut-fg { transition:none; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="brand-badge">J</div><strong>JDISIM · eSIM 발급</strong></div>
  <div id="app"><div class="card center"><div class="spin"></div><div class="muted">주문 정보를 불러오는 중...</div></div></div>
</div>
<a class="kakao-float" href="https://pf.kakao.com/_GSixcn/chat" target="_blank" rel="noopener">💬 카톡 상담</a>
<script>
// ============ 서버 연동 설정 (Flask/Vercel 연결 시 여기만 수정) ============
var CONFIG = {
  ORDER_API:  '',  // GET ?token=   주문/발급상태 조회
  ISSUE_API:  '',  // POST {token}  발급 실행 (서버: 멱등 필수)
  USAGE_API:  '',  // GET ?iccid=   사용량 (used_mb,total_mb,daily:[{date,mb}],status)
  STATUS_API: ''   // GET ?iccid=   설치(다운로드) 여부 {installed:true/false}
};
// =======================================================================
var token = new URLSearchParams(location.search).get('t') || '';
var DEMO = location.hash.indexOf('demo') !== -1;
var order = null;

function $(id){ return document.getElementById(id); }
function h(html){ $('app').innerHTML = html; }
function esc(s){ return String(s || '').replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); }
function toast(msg){ var t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(15,23,42,0.94);color:#fff;font-size:0.78rem;font-weight:800;padding:11px 19px;border-radius:24px;z-index:99999;max-width:86vw;text-align:center;'; document.body.appendChild(t); setTimeout(function(){t.remove();},2200); }
function copy(v,msg){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(v).then(function(){ toast(msg||'📋 복사됐어요'); }); } }
function fmtDate(iso){ try{ var d=new Date(iso); if(isNaN(d)) return ''; var w=['일','월','화','수','목','금','토']; return (d.getMonth()+1)+'월 '+d.getDate()+'일('+w[d.getDay()]+')'; }catch(e){ return ''; } }
function parseLpa(lpa){ var p=String(lpa||'').split('$'); return { smdp:p[1]||'', code:p[2]||'', confirm:p[3]||'' }; }
function gb(mb){ return (Math.round(mb/1024*100)/100); }

// ---------------- 주문 로드 ----------------
function loadOrder(){
  if (DEMO) {
    order = { orderCode:'JD-20260710-DEMO', buyerName:'김여행', phoneMasked:'010-77**-73**', productName:'일본 소프트뱅크 매일 2GB / 5일', quantity:1, country:'일본',
      validity:'구매일로부터 30일', status:'PAID', autoIssueAt:new Date(Date.now()+6.5*86400000).toISOString() };
    return renderPreIssue();
  }
  if (!token) return renderError('링크가 올바르지 않아요','카카오톡으로 받으신 발급 링크를 다시 확인해 주세요.');
  if (!CONFIG.ORDER_API) return renderError('발급 시스템 준비 중이에요','곧 오픈됩니다! 급하시면 카톡 상담으로 도와드릴게요.');
  fetch(CONFIG.ORDER_API+'?token='+encodeURIComponent(token))
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){
      order=d;
      if (d.status==='ISSUED' && d.lpa) renderIssued(d.lpa, true);
      else if (d.status==='PAID') renderPreIssue();
      else if (d.status==='REFUNDED') renderError('환불 처리된 주문이에요','이미 환불이 완료되어 발급할 수 없어요.');
      else renderError('발급을 진행할 수 없는 상태예요','카톡 상담으로 문의해 주시면 바로 확인해 드릴게요.');
    })
    .catch(function(){ renderError('주문을 찾지 못했어요','링크가 만료되었거나 잘못되었을 수 있어요. 카톡 상담으로 문의해 주세요.'); });
}

// ---------------- 발급 전 ----------------
function renderPreIssue(){
  h('<div class="card ticket">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:0.72rem;font-weight:800;color:#F2751F;">🎫 발급 대기 중인 여행 티켓</span><span class="badge wait">발급 대기</span></div>' +
    '<div class="row"><span>상품</span><strong>'+esc(order.productName)+(order.quantity>1?' × '+order.quantity:'')+'</strong></div>' +
    '<div class="row"><span>주문번호</span><strong>'+esc(order.orderCode)+'</strong></div>' +
    '<div class="row"><span>수령인</span><strong>'+esc(order.buyerName)+'</strong></div>' +
    '<div class="barcode"></div></div>' +

    '<div class="notice" style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.3);color:#15803d;">✅ <strong>발급해도 사용일은 아직 시작되지 않아요</strong><br>설치 후 <strong>현지 통신사 신호를 잡는 순간</strong>부터 카운트되는 바우처 방식 — 출국 전 미리 발급·설치해 두셔도 괜찮아요.</div>' +
    '<div class="notice" style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.3);color:#92400e;">⏳ 단, <strong>'+esc(order.validity||'유효기간 내 활성화 필요 (기간은 QR 안내문 참조)')+'</strong> — 기간 안에 활성화하지 않으면 만료돼요.</div>' +
    (String(order.activation||'').indexOf('희망일')!==-1 ? '<div class="notice" style="background:rgba(59,130,246,0.06);border:1px solid rgba(59,130,246,0.25);color:#1d4ed8;">📆 <strong>개통 예정일 지정 상품</strong> — 누르지 않아도 예정일 전날 자동 발급해 드려요.</div>' : '') +
    '<div class="notice" style="background:#fff;border:1px solid #e5eaf2;color:#334155;"><strong>발급 전 30초 체크 ✍️</strong><br>① 키패드에 <strong>*#06#</strong> 입력 → <strong>EID</strong>가 보이면 eSIM 지원 기종이에요<br>② 발급 후에는 <strong>취소·환불 불가</strong> (지금은 100% 환불 가능)' +
    (order.autoIssueAt&&fmtDate(order.autoIssueAt) ? '<br>③ 누르지 않아도 <strong style="color:#b45309;">'+fmtDate(order.autoIssueAt)+'에 자동 발급</strong>돼요 — 환불 원하시면 그 전에 카톡 주세요' : '') + '</div>' +
    (order.autoIssueAt&&fmtDate(order.autoIssueAt) ? '<div class="notice" style="background:#fff;border:1px solid #e5eaf2;color:#334155;">⏰ <strong>'+fmtDate(order.autoIssueAt)+' 자동 발급 예정</strong> — 발급돼도 사용은 현지 활성화부터지만, 유효기간(대부분 구매일 기준)은 계속 흐르고 있어요.</div>' : '') +

    '<label class="agree-box" id="agDevice"><input type="checkbox"><span>*#06#으로 <strong>EID를 확인</strong>했고, eSIM 지원 기종이 맞아요 <span style="color:#F2751F;">(필수)</span></span></label>' +
    '<label class="agree-box" id="agRefund"><input type="checkbox"><span>발급 후 <strong>취소·환불 불가</strong> 및 <strong>유효기간 내 활성화</strong> 필요함을 확인했어요 <span style="color:#F2751F;">(필수)</span></span></label>' +
    '<div style="height:14px;"></div>' +
    '<button class="btn btn-primary" id="issueBtn">🎫 eSIM 발급하기</button>' +
    '<div class="center" style="margin-top:9px;"><span class="muted">QR 생성은 수 초~수 분 · 사용일은 현지에서 신호를 잡는 순간부터</span></div>');
  var boxes=[$('agDevice'),$('agRefund')];
  boxes.forEach(function(b){ b.querySelector('input').addEventListener('change',function(){ b.classList.toggle('ok',this.checked); }); });
  $('issueBtn').addEventListener('click',function(){
    var miss=boxes.filter(function(b){ return !b.querySelector('input').checked; });
    if(miss.length){ miss.forEach(function(b){ b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake'); }); return; }
    doIssue();
  });
}

function doIssue(){
  h('<div class="card center"><div class="spin"></div><div style="font-weight:800;font-size:0.9rem;">통신사에서 QR코드를 만들고 있어요</div><div class="muted" style="margin-top:4px;">보통 수 초, 길면 몇 분 — 화면을 닫지 마세요</div></div>');
  if (DEMO){ setTimeout(function(){ order.status='ISSUED'; renderIssued('LPA:1$rsp.billionconnect.com$F8B7C1B0B68F4AB889460F568F1F13D7', false); },1600); return; }
  fetch(CONFIG.ISSUE_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token,agreedNoRefund:true,agreedDevice:true,agreedAt:new Date().toISOString()})})
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(d){ if(d.lpa) renderIssued(d.lpa,false); else if(d.status==='PENDING') pollIssue(0); else throw 0; })
    .catch(function(){ renderError('발급 중 문제가 생겼어요','결제는 안전하게 보존되어 있어요. 잠시 후 다시 시도하시거나 카톡 상담을 눌러주세요.'); });
}
function pollIssue(n){
  if(n>40) return renderError('발급이 지연되고 있어요','완료되면 카톡으로 알려드릴게요 — 결제는 안전하게 보존됩니다.');
  setTimeout(function(){
    fetch(CONFIG.ORDER_API+'?token='+encodeURIComponent(token)).then(function(r){return r.json();})
      .then(function(d){ if(d.status==='ISSUED'&&d.lpa) renderIssued(d.lpa,false); else pollIssue(n+1); })
      .catch(function(){ pollIssue(n+1); });
  },3000);
}

// ---------------- 발급 완료: 3탭 설치 + 설치확인 + 사용량 ----------------
function renderIssued(lpa, revisit){
  var p = parseLpa(lpa);
  var isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
  var qrUrl = 'https://api.qrserver.com/v1/create-qr-code/?size=440x440&data='+encodeURIComponent(lpa);
  h('<div class="card ticket">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;"><span style="font-size:0.72rem;font-weight:800;color:#F2751F;">🎫 내 여행 eSIM</span><span class="badge ok">발급 완료</span></div>' +
    '<div class="row"><span>상품</span><strong>'+esc(order?order.productName:'')+'</strong></div>' +
    '<div class="row"><span>주문번호</span><strong>'+esc(order?order.orderCode:'')+'</strong></div>' +
    '<div class="barcode"></div>' +
    '<div class="muted" style="margin-top:8px;">'+(revisit?'이미 발급된 eSIM이에요 — 이 링크로 언제든 다시 볼 수 있어요':'발급 완료! 사용일은 현지에서 신호를 잡는 순간부터 시작돼요')+'</div></div>' +

    // 설치 3탭
    '<div class="card"><div style="font-weight:800;font-size:0.92rem;margin-bottom:2px;">📲 eSIM 설치</div><div class="muted" style="margin-bottom:10px;">셋 중 편한 방법 하나면 돼요 — 와이파이 연결 상태에서!</div>' +
    '<div class="tabs"><button class="tab" id="tb0">⚡ 원클릭</button><button class="tab" id="tb1">🔳 QR 스캔</button><button class="tab" id="tb2">⌨️ 수동입력</button></div>' +
    '<div id="tbody"></div></div>' +

    // 설치 확인
    '<div class="card"><div style="display:flex;align-items:center;gap:8px;"><div style="flex:1;"><div style="font-weight:800;font-size:0.9rem;">🔎 설치됐는지 확인</div><div class="muted">기기에 프로필이 내려갔는지 조회해요</div></div>' +
    '<button class="copybtn" style="padding:11px 15px;font-size:0.76rem;" onclick="checkInstalled(\''+esc(order&&order.iccid||'')+'\')">확인하기</button></div><div id="instResult"></div></div>' +

    // 사용량
    '<div class="card"><div style="font-weight:800;font-size:0.9rem;">📊 데이터 사용량</div><div id="usageBody" class="center"><div class="muted" style="padding:14px 0 6px;">현지에서 개통되면 여기에 실시간 사용량이 떠요</div><button class="btn btn-ghost" onclick="loadUsage()">사용량 불러오기</button></div></div>' +

    '<div class="notice" style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.3);color:#92400e;">⏳ <strong>'+esc((order&&order.validity)||'유효기간 내 활성화 필요 (QR 안내문 참조)')+'</strong> — 기간 내에 현지에서 활성화해 주세요</div>' +
    '<div class="notice" style="background:rgba(239,68,68,0.05);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;">⚠️ 설치한 eSIM 프로필은 <strong>절대 삭제하지 마세요</strong> — 재발급이 안 돼요. 문제가 생기면 삭제 대신 카톡 상담!</div>');

  var tabs=[$('tb0'),$('tb1'),$('tb2')];
  function pick(i){
    tabs.forEach(function(t,j){ t.classList.toggle('on', i===j); });
    var b=$('tbody');
    if(i===0){
      b.innerHTML = (isIOS
        ? '<a class="btn btn-primary" href="https://esimsetup.apple.com/esim_qrcode_provisioning?carddata='+encodeURIComponent(lpa)+'">⚡ 탭 한 번으로 지금 설치</a><div class="center" style="margin-top:8px;"><span class="muted">iOS 17.4 이상 · 버튼을 누르면 애플 설치 화면이 바로 열려요</span></div>'
        : '<div class="notice" style="background:#f8fafc;border:1px solid #e5eaf2;color:#334155;margin-top:0;">갤럭시는 원클릭 대신 <strong>QR 스캔</strong> 또는 <strong>수동입력</strong>이 가장 빨라요 — 위 탭에서 선택하세요 🙂</div>');
    } else if(i===1){
      b.innerHTML = '<div class="center"><div class="qr-frame"><img src="'+qrUrl+'" width="200" height="200" alt="eSIM QR" style="display:block;"></div></div>' +
        '<button class="btn btn-ghost" style="margin-top:10px;" onclick="saveQr(\''+qrUrl.replace(/'/g,'')+'\')">🖼️ 이미지로 저장하기</button>' +
        '<div class="center" style="margin-top:7px;"><span class="muted">다른 화면에 띄우고: 설정 → 셀룰러(연결) → eSIM 추가 → QR 스캔</span></div>';
    } else {
      b.innerHTML = '<div class="copyline"><div><div class="lbl">SM-DP+ 주소</div><div class="val">'+esc(p.smdp)+'</div></div><button class="copybtn" onclick="copy(\''+esc(p.smdp)+'\')">복사</button></div>' +
        '<div class="copyline"><div><div class="lbl">활성화 코드</div><div class="val">'+esc(p.code)+'</div></div><button class="copybtn" onclick="copy(\''+esc(p.code)+'\')">복사</button></div>' +
        (p.confirm?'<div class="copyline"><div><div class="lbl">확인 코드</div><div class="val">'+esc(p.confirm)+'</div></div><button class="copybtn" onclick="copy(\''+esc(p.confirm)+'\')">복사</button></div>':'') +
        (order&&order.iccid?'<div class="copyline"><div><div class="lbl">ICCID</div><div class="val">'+esc(order.iccid)+'</div></div><button class="copybtn" onclick="copy(\''+esc(order.iccid)+'\')">복사</button></div>':'') +
        '<div class="center" style="margin-top:8px;"><span class="muted">설정 → 셀룰러 → eSIM 추가 → <strong>세부사항 직접 입력</strong>에 붙여넣으세요</span></div>';
    }
  }
  tabs.forEach(function(t,i){ t.onclick=function(){ pick(i); }; });
  pick(isIOS?0:1);
  if (DEMO && !order.iccid) order.iccid='8981200391912865945';
}

function saveQr(url){
  fetch(url).then(function(r){ return r.blob(); }).then(function(b){
    var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='JDISIM-eSIM-QR.png'; a.click();
    toast('🖼️ QR 이미지가 저장됐어요');
  }).catch(function(){ window.open(url,'_blank'); toast('이미지를 길게 눌러 저장하세요'); });
}

function checkInstalled(iccid){
  var box=$('instResult');
  box.innerHTML='<div class="muted" style="padding:9px 2px 0;">⏳ 확인 중...</div>';
  if (DEMO){ setTimeout(function(){ box.innerHTML='<div class="notice" style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.3);color:#15803d;">✅ 기기에 설치가 확인됐어요! 현지 도착 후 데이터 로밍만 켜면 끝이에요</div>'; },1200); return; }
  if (!CONFIG.STATUS_API){ box.innerHTML='<div class="notice" style="background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.2);color:#9a5b16;">🛠️ 설치 자동 확인은 곧 오픈돼요 — 설정 → 셀룰러에 새 회선이 보이면 설치 성공이에요!</div>'; return; }
  fetch(CONFIG.STATUS_API+'?iccid='+encodeURIComponent(iccid)).then(function(r){return r.json();})
    .then(function(d){ box.innerHTML = d.installed
      ? '<div class="notice" style="background:rgba(34,197,94,0.07);border:1px solid rgba(34,197,94,0.3);color:#15803d;">✅ 기기에 설치가 확인됐어요! 현지 도착 후 데이터 로밍만 켜면 끝이에요</div>'
      : '<div class="notice" style="background:#f8fafc;border:1px solid #e5eaf2;color:#334155;">아직 설치 전이에요 — 위의 원클릭/QR/수동입력으로 설치해 주세요</div>'; })
    .catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;">확인에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
}

function loadUsage(){
  var box=$('usageBody');
  box.innerHTML='<div class="muted" style="padding:14px 0;">⏳ 조회 중...</div>';
  if (DEMO){ return renderUsage({used_mb:126,total_mb:2048,status:'active',daily:[{date:'2026-07-09',mb:126}]}); }
  if (!CONFIG.USAGE_API){ box.innerHTML='<div class="notice" style="background:rgba(249,115,22,0.06);border:1px solid rgba(249,115,22,0.2);color:#9a5b16;text-align:left;">🛠️ 실시간 사용량 조회는 곧 오픈돼요!<br>지금은 설정 → 셀룰러 → 해당 회선에서 확인할 수 있어요</div>'; return; }
  fetch(CONFIG.USAGE_API+'?iccid='+encodeURIComponent(order&&order.iccid||'')).then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(renderUsage)
    .catch(function(){ box.innerHTML='<div class="notice" style="background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);color:#b91c1c;text-align:left;">조회에 실패했어요 — 잠시 후 다시 시도해 주세요</div>'; });
}

function renderUsage(d){
  var box=$('usageBody');
  var used=Number(d.used_mb)||0, total=Number(d.total_mb)||0;
  var remain=Math.max(0,total-used);
  var pct= total? Math.min(100, used/total*100) : 0;
  var C=2*Math.PI*72; // r=72
  var maxDay = Math.max.apply(null, (d.daily||[{mb:1}]).map(function(x){return x.mb||1;}));
  box.style.textAlign='inherit';
  box.innerHTML =
    '<div class="donut-wrap"><svg width="172" height="172" viewBox="0 0 172 172">' +
    '<defs><linearGradient id="dg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F97316"/><stop offset="1" stop-color="#F59E0B"/></linearGradient></defs>' +
    '<circle class="donut-bg" cx="86" cy="86" r="72"></circle>' +
    '<circle class="donut-fg" id="dfg" cx="86" cy="86" r="72" stroke-dasharray="'+C+'" stroke-dashoffset="'+C+'"></circle></svg>' +
    '<div class="donut-center"><span class="muted">현재 남은 데이터</span><span class="big">'+(total? gb(remain)+' GB' : '무제한 ♾️')+'</span>' +
    '<span class="badge '+(d.status==='active'?'ok':'wait')+'">'+(d.status==='active'?'● 사용 중':d.status==='expired'?'만료됨':'개통 대기')+'</span></div></div>' +
    (total? '<div class="pillstat"><div><div class="l">사용한 데이터</div><div class="v">'+gb(used)+' GB</div></div><div><div class="l">남은 데이터</div><div class="v" style="color:#F2751F;">'+gb(remain)+' GB</div></div></div>' : '') +
    ((d.daily&&d.daily.length)? '<div style="font-weight:800;font-size:0.8rem;margin:14px 0 4px;">일별 사용 내역 <span class="muted">총 '+d.daily.length+'일</span></div>' +
      d.daily.map(function(x){ return '<div class="daybar"><span class="d">'+esc(x.date)+'</span><span class="bar"><i style="width:'+Math.max(4,Math.round((x.mb||0)/maxDay*100))+'%"></i></span><span class="mb">'+(x.mb>=1024? gb(x.mb)+'GB' : Math.round(x.mb)+'MB')+'</span></div>'; }).join('') : '') +
    '<button class="btn btn-ghost" style="margin-top:12px;" onclick="loadUsage()">🔄 새로고침</button>';
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ var el=$('dfg'); if(el) el.style.strokeDashoffset = String(C*(1-pct/100)); }); });
}

function renderError(title,msg){
  h('<div class="card center"><div style="font-size:2rem;">🦊</div><div style="font-weight:800;margin-top:6px;">'+esc(title)+'</div><div class="muted" style="margin-top:6px;line-height:1.7;">'+esc(msg)+'</div><div style="height:14px;"></div><a class="btn btn-primary" href="https://pf.kakao.com/_GSixcn/chat" target="_blank" rel="noopener">💬 카톡 상담 바로 연결</a></div>');
}

loadOrder();
</script>
</body>
</html>
