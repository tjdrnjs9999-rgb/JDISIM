<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="only light">
<meta name="robots" content="noindex, nofollow">
<title>ROMI 복사 버튼 테스트 · JDISIM 내부용</title>
<script>
  // 구매자 게이트 통과용: 파라미터 없이 들어오면 ?care=TEST 자동 부착
  if (location.search.indexOf('care=') === -1) location.replace(location.pathname + '?care=TEST');
</script>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#FBF6EF;color:#0f172a;margin:0;padding:20px 16px 60px;word-break:keep-all}
  .wrap{max-width:480px;margin:0 auto}
  h1{font-size:1.05rem;font-weight:800;margin:0 0 4px}
  h2{font-size:.9rem;font-weight:800;margin:26px 0 8px;color:#F2751F}
  .sub{font-size:.74rem;font-weight:700;color:#94a3b8;margin-bottom:16px}
  .env{background:#fff;border:1px solid rgba(15,23,42,.08);border-radius:14px;padding:12px 14px;font-size:.74rem;font-weight:600;color:#475569;line-height:1.7}
  .env b{color:#0f172a}
  .hint{font-size:.72rem;font-weight:600;color:#64748b;line-height:1.6;margin:6px 0 10px}
  .copybtn{display:block;width:100%;border:1.5px dashed rgba(249,115,22,.5);background:rgba(249,115,22,.05);color:#b45309;border-radius:12px;padding:12px;font-family:inherit;font-size:.82rem;font-weight:800;cursor:pointer}
  .paste{width:100%;box-sizing:border-box;margin-top:9px;padding:12px;border:1.5px solid rgba(15,23,42,.15);border-radius:12px;font-family:inherit;font-size:.85rem;background:#fff}
  .verdict{margin-top:8px;font-size:.8rem;font-weight:800;min-height:1.4em}
  .log{background:#0f172a;color:#a7f3d0;border-radius:12px;padding:12px;font-size:.7rem;line-height:1.7;font-family:ui-monospace,monospace;white-space:pre-wrap;min-height:48px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔍 "Wi-Fi 통화" 복사 버튼 테스트</h1>
  <div class="sub">JDISIM 내부용 · 아이폰 / 갤럭시 양쪽에서 확인</div>

  <div class="env" id="env">환경 판독 중...</div>

  <h2>A. 실제 위젯 그대로 (romi-mode.js v20260714b)</h2>
  <div class="hint">구매자가 케어링크에서 보는 화면과 동일합니다. [여행 모드 설정 시작] → 시트 안의 <b>🔍 복사 버튼</b>을 눌러보세요.</div>
  <div id="romiModeSlot"></div>

  <h2>B. 복사 검증 (클립보드에 진짜 들어갔나)</h2>
  <div class="hint">위 A의 복사 버튼(또는 아래 단독 버튼)을 누른 뒤, 입력칸을 <b>길게 눌러 붙여넣기</b> 하세요. 자동 판정됩니다.</div>
  <button class="copybtn" id="soloBtn">🔍 "Wi-Fi 통화" 복사 (단독 테스트)</button>
  <input class="paste" id="pasteBox" placeholder="여기 길게 눌러 → 붙여넣기">
  <div class="verdict" id="verdict"></div>

  <div class="log" id="log">대기 중 — 동작 결과가 여기 기록됩니다.</div>
</div>

<script src="romi-mode.js?v=20260714b"></script>
<script>
  var logEl = document.getElementById('log');
  function log(t){ logEl.textContent += '\n[' + new Date().toTimeString().slice(0,8) + '] ' + t; }

  (function(){
    var ua = navigator.userAgent || '';
    var plat = /iPhone|iPad|iPod/i.test(ua) ? '아이폰' : /SM-|Samsung/i.test(ua) ? '갤럭시' : /Android/i.test(ua) ? 'Android' : '기타';
    var inapp = /KAKAOTALK|NAVER|Instagram|FBAN|FBAV|Line\//i.test(ua);
    document.getElementById('env').innerHTML = '<b>플랫폼:</b> ' + plat
      + '<br><b>인앱 브라우저:</b> ' + (inapp ? '예 (카톡 인앱에서도 복사는 동작해야 정상)' : '아니오')
      + '<br><b>클립보드 API:</b> ' + (navigator.clipboard && navigator.clipboard.writeText ? '지원' : '미지원 (execCommand 폴백 사용)')
      + '<br><b>UA:</b> ' + ua;
  })();

  // A. 실제 위젯 초기화 (실서비스와 동일한 gateParams)
  RomiMode.init({ gateParams: ['care', 'o', 'n', 'bd', 'plan'] });
  log('위젯 초기화 — 카드가 위 A 영역에 보여야 정상');

  // B. 단독 복사 버튼 (romi-mode.js copySearchTerm과 동일 로직)
  document.getElementById('soloBtn').addEventListener('click', function(){
    var btn = this, txt = 'Wi-Fi 통화';
    function done(ok){
      btn.textContent = ok ? '✅ 복사 완료 — 아래 칸에 붙여넣어 검증' : '❌ 복사 실패 — 직접 입력 안내로 전환되는 케이스';
      log('단독 복사: ' + (ok ? '성공' : '실패'));
    }
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(txt).then(function(){ done(true); }, function(){ fb(); });
      } else fb();
    } catch(e){ done(false); }
    function fb(){
      try {
        var ta = document.createElement('textarea');
        ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0;';
        document.body.appendChild(ta); ta.select();
        var ok = document.execCommand('copy');
        document.body.removeChild(ta);
        log('execCommand 폴백 경로 사용');
        done(!!ok);
      } catch(e){ done(false); }
    }
  });

  // 붙여넣기 판정
  document.getElementById('pasteBox').addEventListener('input', function(){
    var v = this.value.trim();
    var el = document.getElementById('verdict');
    if (!v) { el.textContent = ''; return; }
    if (v === 'Wi-Fi 통화') { el.textContent = '✅ 일치 — 클립보드 정상'; el.style.color = '#15803d'; log('붙여넣기 검증: 일치'); }
    else { el.textContent = '❌ 불일치: "' + v + '"'; el.style.color = '#b91c1c'; log('붙여넣기 검증: 불일치 ("' + v + '")'); }
  });
</script>
</body>
</html>
